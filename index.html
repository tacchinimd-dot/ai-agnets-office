// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let hoveredAgentId = -1;

function showTooltip(agent, mx, my) {
  const info = AGENT_INFO[agent.id];
  let html = `
    <div class="tt-name" style="color:${agent.color}">${agent.name}</div>
    <div class="tt-badge">${info.title} · ${info.titleSub}</div>
    <hr>
    <div class="tt-sec">📋 역할</div>
    ${info.roles.map(r=>`<div class="tt-item">${r}</div>`).join('')}
    <div class="tt-sec">⚡ 현재 업무</div>
    ${info.current.map(t=>`<div class="tt-item">${t}</div>`).join('')}
    <div class="tt-sec pending tt-pending">⏳ 대기 업무</div>
    ${info.pending.map(t=>`<div class="tt-item">${t}</div>`).join('')}
  `;
  const skills = AGENT_SKILLS[agent.id] || [];
  if (skills.length > 0) {
    html += `<div class="tt-sec">🔗 데이터 소스</div>`;
    html += skills.map(s => `<div class="tt-item">${s.icon} ${s.label}</div>`).join('');
  }
  if (info.question) html += `<div class="tt-q">❓ ${info.question}</div>`;
  const live = agentLiveStatus[agent.id];
  html += `<div class="tt-status"><span style="background:${live.color}"></span>${live.label}</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  // Position near mouse, avoid overflow
  const tw = 300, th = tooltip.offsetHeight || 320;
  let tx = mx + 18, ty = my - th/2;
  if (tx + tw > window.innerWidth - 10) tx = mx - tw - 18;
  if (ty < 10) ty = 10;
  if (ty + th > window.innerHeight - 10) ty = window.innerHeight - th - 10;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';

  // Color accent border
  tooltip.style.borderColor = agent.color + '55';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  hoveredAgentId = -1;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = 1600 / rect.width;
  const scaleY = 900  / rect.height;
  const cx2 = (e.clientX - rect.left) * scaleX;
  const cy2 = (e.clientY - rect.top)  * scaleY;

  let found = null;
  for (const agent of agents) {
    const ax = agent.state==='idle' ? agent.hx : agent.x;
    const ay = agent.state==='idle' ? agent.hy : agent.y;
    if (Math.abs(cx2-ax) < 32 && cy2 > ay-100 && cy2 < ay+20) { found=agent; break; }
  }

  if (found) {
    canvas.style.cursor = 'pointer';
    if (found.id !== hoveredAgentId) { hoveredAgentId=found.id; showTooltip(found, e.clientX, e.clientY); }
    else {
      // update position only
      const tw=300, th=tooltip.offsetHeight||320;
      let tx=e.clientX+18, ty=e.clientY-th/2;
      if (tx+tw>window.innerWidth-10) tx=e.clientX-tw-18;
      if (ty<10) ty=10;
      if (ty+th>window.innerHeight-10) ty=window.innerHeight-th-10;
      tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
    }
  } else {
    canvas.style.cursor='default';
    if (hoveredAgentId !== -1) hideTooltip();
  }
});
canvas.addEventListener('mouseleave', hideTooltip);

// ── Main loop ─────────────────────────────────────────────────────────────────
let frame=0;
function loop() {
  frame++;
  const c=ctx;
  c.drawImage(woodOff,0,0);
  drawCeiling(c);
  drawCEORoom(c, frame);
  drawConferenceRoom(c, frame);
  MR.slice(1).forEach(mr=>drawMeetingRoom(c,mr,frame));
  drawDecorations(c);
  agents.forEach(agent=>drawWorkstation(c,agent,frame));
  drawMeetingLines(c);

  // Walking / meeting agents — front-facing, sorted by Y
  agents.filter(a=> a.state!=='idle' || (Math.abs(a.x-a.hx)>=5 || Math.abs(a.y-a.hy)>=5) ).sort((a,b)=>a.y-b.y).forEach(agent=>{
    const isSeated = agent.state === 'inMeeting';
    if (isSeated) {
      // 회의실에서 앉아있는 모습: 의자 + 캐릭터 (다리 없음, 정면)
      const cx = agent.x, cy = agent.y;
      // 의자 좌석
      roundRect(c, cx-16, cy+2, 32, 10, 3, '#2a2040', '#1a1030', 1);
      // 의자 등받이 (뒷줄이면 위쪽, 앞줄이면 아래쪽)
      const chairBackY = agent.seatIdx !== undefined && agent.mrIdx >= 0 ? cy-18 : cy-18;
      roundRect(c, cx-14, chairBackY, 28, 20, 3, '#3a2e55', '#2a2040', 1);
      // 의자 다리
      c.strokeStyle='#1a1025'; c.lineWidth=2;
      c.beginPath(); c.moveTo(cx-12,cy+12); c.lineTo(cx-12,cy+20); c.stroke();
      c.beginPath(); c.moveTo(cx+12,cy+12); c.lineTo(cx+12,cy+20); c.stroke();
      // 캐릭터 앉은 자세 (drawLegs=false, showBack=false = 정면)
      drawCharacter(c, agent, cx, cy, false, false);
    } else {
      // 걷는 모습 (drawLegs=true)
      drawCharacter(c, agent, agent.x, agent.y, true, false);
    }
    // name tag
    c.font='bold 9px Segoe UI'; c.textAlign='center';
    c.fillStyle='rgba(8,12,28,0.75)';
    roundRect(c, agent.x-22, agent.y+6, 44, 14, 4, 'rgba(8,12,28,0.75)');
    c.fillStyle=agent.color; c.fillText(agent.name, agent.x, agent.y+17);
  });

  // Room outline
  c.save(); c.strokeStyle='rgba(0,0,0,0.55)'; c.lineWidth=3;
  c.strokeRect(20,60,1555,840);
  c.beginPath(); c.moveTo(1290,460); c.lineTo(1575,460); c.stroke();
  c.restore();

  agents.forEach(a=>a.update(agents));
  if (frame%30===0) updateUI();
  requestAnimationFrame(loop);
}

// ── Chat System ──────────────────────────────────────────────────────────────

const CHAT_AGENTS = [
  { id: -1, name: '전체 회의', role: '모든 에이전트 참여', color: '#58a6ff' },
  ...AGENT_CFG.map(a => ({ id: a.id, name: a.name, role: AGENT_INFO[a.id].title, color: a.color }))
];

let currentChatAgent = -1; // -1 = 전체회의
let ws = null;
let isStreaming = false;
const chatHistories = {}; // agentId → [{role, name, content}]
CHAT_AGENTS.forEach(a => chatHistories[a.id] = []);

// ── Tabs ──
function buildTabs() {
  const tabsEl = document.getElementById('chat-tabs');
  tabsEl.innerHTML = '';
  CHAT_AGENTS.forEach(a => {
    const tab = document.createElement('button');
    tab.className = 'chat-tab' + (a.id === currentChatAgent ? ' active' : '');
    tab.innerHTML = (a.id >= 0 ? `<span class="tab-dot" style="background:${a.color}"></span>` : '') + a.name;
    tab.onclick = () => switchChat(a.id);
    tabsEl.appendChild(tab);
  });
}

function switchChat(agentId) {
  currentChatAgent = agentId;
  buildTabs();
  updateChatHeader();
  renderMessages();

  // 하단 agent-card 하이라이트
  document.querySelectorAll('.agent-card').forEach((card, i) => {
    card.classList.toggle('active', i === agentId);
  });
}

function updateChatHeader() {
  const agent = CHAT_AGENTS.find(a => a.id === currentChatAgent);
  const nameEl = document.getElementById('chat-header-name');
  const roleEl = document.getElementById('chat-header-role');
  nameEl.textContent = agent.name;
  nameEl.style.color = agent.color;
  roleEl.textContent = agent.role;
}

// ── Messages ──
function renderMessages() {
  const box = document.getElementById('chat-messages');
  const msgs = chatHistories[currentChatAgent] || [];

  if (msgs.length === 0) {
    const agent = CHAT_AGENTS.find(a => a.id === currentChatAgent);
    box.innerHTML = `<div class="chat-welcome">
      <div class="welcome-icon">${currentChatAgent === -1 ? '🏢' : '💬'}</div>
      <div class="welcome-name">${agent.name}</div>
      <p style="margin-top:8px">${agent.role}</p>
      <p style="margin-top:16px; color:#586069; font-size:12px">
        ${currentChatAgent === -1
          ? '전체 에이전트에게 질문하면 CEO부터 순서대로 답변합니다.'
          : `${agent.name}에게 메시지를 보내보세요.`}
      </p>
    </div>`;
    return;
  }

  box.innerHTML = '';
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + m.role;
    if (m.role === 'consultation') {
      // 상담 블록: HTML 직접 삽입
      div.className = '';
      div.innerHTML = m.content;
    } else if (m.role === 'agent') {
      const agentData = CHAT_AGENTS.find(a => a.id === m.agentId) || {};
      div.style.borderLeftColor = agentData.color || '#555';
      div.innerHTML = `<div class="msg-name" style="color:${agentData.color || '#888'}">${m.name || agentData.name}</div><div class="msg-content">${formatMessage(m.content)}</div>`;
    } else {
      div.textContent = m.content;
    }
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function formatMessage(text) {
  // Step 1: Extract markdown images and bare image URLs BEFORE escaping, replace with placeholders
  var imgPlaceholders = [];
  // Markdown image syntax ![alt](url)
  text = text.replace(/!\[([^\]]*)\]\((https?:\/\/[^\s)]+\.(?:jpg|jpeg|png|gif|webp)(?:\?[^\s)]*)?)\)/gi, function(m, alt, url) {
    var idx = imgPlaceholders.length;
    imgPlaceholders.push('<a href="' + url + '" target="_blank" rel="noopener"><img src="' + url + '" alt="' + alt + '" class="chat-img" onerror="this.style.display=\'none\'" /></a>');
    return '%%IMG_PLACEHOLDER_' + idx + '%%';
  });
  // Bare image URLs (common extensions)
  text = text.replace(/(https?:\/\/[^\s<>"']+\.(?:jpg|jpeg|png|gif|webp)(?:\?[^\s<>"']*)?)/gi, function(match) {
    var idx = imgPlaceholders.length;
    imgPlaceholders.push('<a href="' + match + '" target="_blank" rel="noopener"><img src="' + match + '" class="chat-img" onerror="this.style.display=\'none\'" /></a>');
    return '%%IMG_PLACEHOLDER_' + idx + '%%';
  });
  // Step 2: Existing transformations (HTML escape, markdown bold, inline code)
  text = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code style="background:#2a2f3a;padding:1px 4px;border-radius:3px;font-size:12px">$1</code>');
  // Step 3: Restore image placeholders
  for (var i = 0; i < imgPlaceholders.length; i++) {
    text = text.replace('%%IMG_PLACEHOLDER_' + i + '%%', imgPlaceholders[i]);
  }
  return text;
}

function appendStreamDelta(agentId, delta) {
  const msgs = chatHistories[currentChatAgent];
  const last = msgs[msgs.length - 1];
  if (last && last.role === 'agent' && last.agentId === agentId && last.streaming) {
    last.content += delta;
  }
  // 스트리밍 중: 마지막 메시지 DOM만 직접 업데이트 (전체 재렌더링 방지 → 깜빡임 해결)
  const box = document.getElementById('chat-messages');
  const lastBubble = box?.lastElementChild;
  if (lastBubble && lastBubble.classList.contains('chat-msg') && lastBubble.classList.contains('agent')) {
    const contentEl = lastBubble.querySelector('.msg-content') || lastBubble;
    if (last) contentEl.innerHTML = (last.name ? `<div class="msg-name" style="color:${AGENT_CFG.find(a=>a.id===last.agentId)?.color||'#adf'}">${last.name}</div>` : '') + formatMessage(last.content);
    box.scrollTop = box.scrollHeight;
  } else {
    renderMessages();
  }
}

// ── WebSocket ──
function connectWS() {
  try {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = location.host;
    if (!host) {
      const st = document.getElementById('connection-status');
      st.textContent = '로컬 파일 모드 — 채팅은 서버 실행 후 사용 가능 (node server/index.js)';
      st.className = 'disconnected';
      return;
    }
    const url = `${protocol}//${host}`;
    ws = new WebSocket(url);

    ws.onopen = () => {
      const st = document.getElementById('connection-status');
      st.textContent = '서버 연결됨';
      st.className = 'connected';
      // 스케줄/트리거 목록 요청
      requestScheduleList();
      requestTriggerList();
    };

    ws.onclose = () => {
      const st = document.getElementById('connection-status');
      st.textContent = '서버 연결 끊김 — 3초 후 재연결...';
      st.className = 'disconnected';
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
      const st = document.getElementById('connection-status');
      st.textContent = '서버에 연결할 수 없습니다 (node server/index.js 실행 필요)';
      st.className = 'disconnected';
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      handleWSMessage(msg);
    };
  } catch (err) {
    console.warn('WebSocket 연결 실패:', err);
    const st = document.getElementById('connection-status');
    st.textContent = '서버에 연결할 수 없습니다 (node server/index.js 실행 필요)';
    st.className = 'disconnected';
  }
}

// ── Minutes Panel (회의록) & Approval Panel (결재 대기) ──────────────────────

let panelMode = 'chat'; // 'chat' | 'minutes' | 'approval'
const minutesEntries = []; // max 200
let minutesFilter = 'all'; // 'all' | 'instruction' | 'chat' | 'meeting' | 'tool_use' | agentId(number)
const approvalRequests = [];
let minutesIdCounter = 0;

const MINUTES_TYPE_LABELS = {
  instruction: '📝 사용자 지시',
  chat: '💬 1:1 대화',
  meeting: '🏢 회의 발언',
  tool_use: '📊 데이터 조회',
};

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Panel mode ──

function setPanelMode(mode) {
  panelMode = mode;
  document.querySelectorAll('.panel-mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  const show = (id, v) => { const el = document.getElementById(id); if (el) el.style.display = v ? '' : 'none'; };
  show('chat-tabs', mode === 'chat');
  show('chat-header', mode === 'chat');
  show('chat-messages', mode === 'chat');
  show('chat-input-area', mode === 'chat');
  show('minutes-filter', mode === 'minutes');
  show('minutes-panel', mode === 'minutes');
  show('approval-panel', mode === 'approval');
  show('schedule-panel', mode === 'schedule');
  show('chart-panel', mode === 'chart');
  if (mode === 'minutes') { renderMinutesFilter(); renderMinutes(); }
  if (mode === 'approval') { renderApprovalPanel(); }
  if (mode === 'schedule') { requestScheduleList(); requestTriggerList(); renderSchedulePanel(); }
  if (mode === 'chart') { renderChartPanel(); }
}

// ── Minutes entries ──

function addMinutesEntry(entry) {
  entry.id = ++minutesIdCounter;
  entry.timestamp = entry.timestamp || new Date().toISOString();
  minutesEntries.unshift(entry);
  if (minutesEntries.length > 200) minutesEntries.pop();
  updateMinutesBadge();
  if (panelMode === 'minutes') renderMinutes();
}

function updateMinutesBadge() {
  const badge = document.getElementById('minutes-badge');
  if (minutesEntries.length > 0) {
    badge.textContent = minutesEntries.length;
    badge.className = 'panel-badge minutes-count';
  } else {
    badge.textContent = '';
    badge.className = 'panel-badge empty';
  }
}

function renderMinutesFilter() {
  const el = document.getElementById('minutes-filter');
  if (!el) return;
  el.style.display = 'flex';
  const types = ['all', 'instruction', 'chat', 'meeting', 'tool_use'];
  const labels = { all: '전체', instruction: '지시', chat: '1:1', meeting: '회의', tool_use: '데이터' };
  let html = types.map(t =>
    `<button class="minutes-filter-btn ${minutesFilter === t ? 'active' : ''}" onclick="setMinutesFilter('${t}')">${labels[t]}</button>`
  ).join('');
  // 에이전트별 필터
  const agentIds = [...new Set(minutesEntries.map(e => e.agentId))];
  agentIds.forEach(id => {
    const a = AGENT_CFG.find(c => c.id === id);
    if (!a) return;
    html += `<button class="minutes-filter-btn ${minutesFilter === id ? 'active' : ''}" onclick="setMinutesFilter(${id})">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${a.color};margin-right:3px;vertical-align:middle"></span>${a.name}
    </button>`;
  });
  html += `<button class="minutes-filter-btn" onclick="exportMinutes('md')" title="마크다운">📥 MD</button>`;
  html += `<button class="minutes-filter-btn" onclick="exportMinutes('html')" title="HTML">📥 HTML</button>`;
  el.innerHTML = html;
}

function setMinutesFilter(f) {
  minutesFilter = f;
  renderMinutesFilter();
  renderMinutes();
}

function renderMinutes() {
  const panel = document.getElementById('minutes-panel');
  if (!panel) return;
  panel.style.display = 'flex';

  let filtered = minutesEntries;
  if (minutesFilter === 'instruction' || minutesFilter === 'chat' || minutesFilter === 'meeting' || minutesFilter === 'tool_use') {
    filtered = minutesEntries.filter(e => e.type === minutesFilter);
  } else if (typeof minutesFilter === 'number') {
    filtered = minutesEntries.filter(e => e.agentId === minutesFilter);
  }

  if (filtered.length === 0) {
    panel.innerHTML = `<div class="minutes-empty">
      <div style="font-size:36px;margin-bottom:12px">📋</div>
      <div style="font-size:15px;font-weight:600;color:#c9d1d9;margin-bottom:8px">회의록이 비어있습니다</div>
      <div>에이전트와 대화하면 자동으로 기록됩니다.</div>
    </div>`;
    return;
  }

  panel.innerHTML = filtered.map(e => {
    const a = AGENT_CFG.find(c => c.id === e.agentId);
    const color = a ? a.color : '#888';
    const name = e.agentName || (a ? a.name : '');
    const time = new Date(e.timestamp).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    const typeLabel = MINUTES_TYPE_LABELS[e.type] || e.type;
    const typeCls = 't-' + e.type;

    let content = escapeHtml(e.content || '');
    let dataRefs = '';
    if (e.dataReferenced) {
      dataRefs = e.dataReferenced.split(',').map(d => `<span class="minutes-data-ref">${escapeHtml(d.trim())}</span>`).join('');
    }

    return `<div class="minutes-entry type-${e.type}" onclick="this.classList.toggle('expanded')">
      <div class="minutes-header">
        <div class="minutes-agent">
          <span class="minutes-dot" style="background:${color}"></span>
          <span class="minutes-name" style="color:${color}">${name}</span>
          <span class="minutes-type ${typeCls}">${typeLabel}</span>
        </div>
        <span class="minutes-time">${time}</span>
      </div>
      <div class="minutes-content">${content}</div>
      ${dataRefs ? `<div style="margin-top:4px">${dataRefs}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Approval system ──

function addApprovalRequest(data) {
  approvalRequests.unshift({ ...data, status: 'pending', resolvedAt: null });
  updateApprovalBadge();
  if (panelMode === 'approval') renderApprovalPanel();
}

function updateApprovalBadge() {
  const badge = document.getElementById('approval-badge');
  const pending = approvalRequests.filter(r => r.status === 'pending').length;
  if (pending > 0) {
    badge.textContent = pending;
    badge.className = 'panel-badge approval-count';
  } else {
    badge.textContent = '';
    badge.className = 'panel-badge empty';
  }
}

function renderApprovalPanel() {
  const panel = document.getElementById('approval-panel');
  if (!panel) return;
  panel.style.display = 'flex';

  if (approvalRequests.length === 0) {
    panel.innerHTML = `<div class="approval-empty">
      <div style="font-size:36px;margin-bottom:12px">🔔</div>
      <div style="font-size:15px;font-weight:600;color:#c9d1d9;margin-bottom:8px">결재 대기 항목이 없습니다</div>
      <div>CEO(한준혁)가 주요 의사결정을 요청하면<br>여기에 표시됩니다.</div>
    </div>`;
    return;
  }

  // pending 먼저, 나머지는 시간순
  const sorted = [...approvalRequests].sort((a, b) => {
    if (a.status === 'pending' && b.status !== 'pending') return -1;
    if (a.status !== 'pending' && b.status === 'pending') return 1;
    return 0;
  });

  panel.innerHTML = sorted.map(r => {
    const time = new Date(r.timestamp).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const statusLabel = { pending: '대기 중', approved: '승인됨', rejected: '반려됨' }[r.status];
    const statusCls = 's-' + r.status;
    const canAct = r.status === 'pending' && ws && ws.readyState === WebSocket.OPEN;

    return `<div class="approval-card ${r.status}">
      <div class="approval-card-header">
        <div class="approval-title">${escapeHtml(r.title)}</div>
        <span class="approval-status ${statusCls}">${statusLabel}</span>
      </div>
      <div class="approval-desc">${escapeHtml(r.description)}</div>
      ${r.context ? `<div class="approval-context">${escapeHtml(r.context)}</div>` : ''}
      <div class="approval-time">${time}</div>
      ${r.status === 'pending' ? `<div class="approval-actions">
        <button class="approval-btn approve" ${canAct?'':'disabled'} onclick="handleApproval('${r.id}','approved')">승인</button>
        <button class="approval-btn reject" ${canAct?'':'disabled'} onclick="handleApproval('${r.id}','rejected')">반려</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function handleApproval(approvalId, decision) {
  let comment = '';
  if (decision === 'rejected') {
    comment = prompt('반려 사유를 입력하세요:');
    if (comment === null) return; // 취소
  }
  ws.send(JSON.stringify({ type: 'approval_response', approvalId, decision, comment }));
  // 낙관적 업데이트
  const req = approvalRequests.find(r => r.id === approvalId);
  if (req) { req.status = decision; req.resolvedAt = new Date().toISOString(); }
  updateApprovalBadge();
  renderApprovalPanel();
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'stream_start': {
      const target = currentChatAgent;
      const msgs = chatHistories[target];
      msgs.push({ role: 'agent', agentId: msg.agentId, name: msg.agentName, content: '', streaming: true });
      setAgentLiveStatus(msg.agentId, 'responding');
      // 1:1 대화: 해당 에이전트 모니터 활성 효과
      setChatActiveAgent(msg.agentId);
      renderMessages();
      break;
    }
    case 'stream_delta': {
      appendStreamDelta(msg.agentId, msg.delta);
      break;
    }
    case 'stream_end': {
      const msgs = chatHistories[currentChatAgent];
      const last = msgs[msgs.length - 1];
      if (last && last.streaming) {
        last.streaming = false;
        // 에이전트 응답을 회의록에 기록
        const respPreview = (last.content || '').slice(0, 150) + (last.content.length > 150 ? '...' : '');
        const isMeeting = currentChatAgent === -1;
        addMinutesEntry({
          type: isMeeting ? 'meeting' : 'chat',
          agentId: msg.agentId,
          agentName: last.name || msg.agentName,
          content: respPreview,
        });
      }
      isStreaming = false;
      setAgentLiveStatus(msg.agentId, 'idle');
      clearChatActiveAgent();
      document.getElementById('chat-send').disabled = false;
      document.getElementById('chat-input').focus();
      renderMessages();
      break;
    }
    case 'meeting_start': {
      isStreaming = true;
      document.getElementById('chat-send').disabled = true;
      AGENT_CFG.forEach(a => setAgentLiveStatus(a.id, 'meeting'));
      triggerCanvasMeeting();
      break;
    }
    case 'meeting_end': {
      isStreaming = false;
      document.getElementById('chat-send').disabled = false;
      document.getElementById('chat-input').focus();
      AGENT_CFG.forEach(a => setAgentLiveStatus(a.id, 'idle'));
      endCanvasMeeting();
      break;
    }
    case 'consultation_start': {
      // 상담 시작: 채팅에 인라인 표시
      const callingColor = AGENT_CFG.find(a => a.id === msg.callingAgentId)?.color || '#58a6ff';
      const targetColor = AGENT_CFG.find(a => a.id === msg.targetAgentId)?.color || '#58a6ff';
      const consultHtml = `<div class="consultation-block consultation-pending" data-consult-target="${msg.targetAgentId}">` +
        `<div class="consult-header">` +
        `<span class="consult-icon">🔄</span> ` +
        `<span style="color:${callingColor};font-weight:700">${escapeHtml(msg.callingName)}</span>` +
        ` → <span style="color:${targetColor};font-weight:700">${escapeHtml(msg.targetName)}</span>에게 상담 중...` +
        `</div>` +
        `<div class="consult-question">"${escapeHtml(msg.question.slice(0, 150))}"</div>` +
        `</div>`;
      // 현재 활성 대화에 상담 블록 추가
      const chatAgentId = msg.callingAgentId;
      if (!chatHistories[chatAgentId]) chatHistories[chatAgentId] = [];
      chatHistories[chatAgentId].push({ role: 'consultation', content: consultHtml, targetAgentId: msg.targetAgentId });
      if (currentChatAgent === chatAgentId || currentChatAgent === -1) renderMessages();
      setAgentLiveStatus(msg.callingAgentId, 'walking');
      setAgentLiveStatus(msg.targetAgentId, 'walking');
      // 캔버스: 두 에이전트가 Meeting Room 2로 이동
      triggerCanvasConsultation(msg.callingAgentId, msg.targetAgentId);
      // 회의록 기록
      addMinutesEntry({ type: 'tool_use', agentId: msg.callingAgentId, agentName: msg.callingName, content: `[상담 요청 → ${msg.targetName}] ${msg.question.slice(0, 100)}` });
      break;
    }
    case 'consultation_end': {
      // 상담 완료: pending 블록을 완료 상태로 업데이트
      const chatAgentId2 = msg.callingAgentId;
      const history = chatHistories[chatAgentId2] || [];
      const pendingIdx = history.findLastIndex(m => m.role === 'consultation' && m.targetAgentId === msg.targetAgentId);
      if (pendingIdx >= 0) {
        const callingColor2 = AGENT_CFG.find(a => a.id === msg.callingAgentId)?.color || '#58a6ff';
        const targetColor2 = AGENT_CFG.find(a => a.id === msg.targetAgentId)?.color || '#58a6ff';
        const responsePreview = msg.response.length > 300 ? msg.response.slice(0, 300) + '...' : msg.response;
        history[pendingIdx].content = `<div class="consultation-block consultation-done" data-consult-target="${msg.targetAgentId}">` +
          `<div class="consult-header" onclick="this.parentElement.classList.toggle('expanded')">` +
          `<span class="consult-icon">✅</span> ` +
          `<span style="color:${callingColor2};font-weight:700">${escapeHtml(msg.callingName)}</span>` +
          ` ← <span style="color:${targetColor2};font-weight:700">${escapeHtml(msg.targetName)}</span> 상담 완료` +
          `<span class="consult-toggle">▼</span>` +
          `</div>` +
          `<div class="consult-response">${escapeHtml(responsePreview).replace(/\n/g, '<br>')}</div>` +
          `</div>`;
      }
      if (currentChatAgent === chatAgentId2 || currentChatAgent === -1) renderMessages();
      setAgentLiveStatus(msg.targetAgentId, 'idle');
      // 캔버스: 두 에이전트가 자리로 복귀
      endCanvasConsultation(msg.callingAgentId, msg.targetAgentId);
      addMinutesEntry({ type: 'chat', agentId: msg.targetAgentId, agentName: msg.targetName, content: `[상담 답변 → ${msg.callingName}] ${msg.response.slice(0, 100)}` });
      break;
    }
    case 'tool_activity': {
      // 회의록에 데이터 조회 기록 추가
      addMinutesEntry({
        type: 'tool_use',
        agentId: msg.agentId,
        agentName: msg.agentName,
        content: `${msg.toolLabel}: ${msg.preview}`,
        dataReferenced: msg.toolLabel,
      });
      setAgentLiveStatus(msg.agentId, 'querying');
      setTimeout(() => {
        if (agentLiveStatus[msg.agentId].status === 'querying') {
          setAgentLiveStatus(msg.agentId, 'responding');
        }
      }, 2000);
      break;
    }
    case 'approval_request': {
      addApprovalRequest(msg);
      break;
    }
    case 'approval_resolved': {
      const req = approvalRequests.find(r => r.id === msg.approvalId);
      if (req) { req.status = msg.decision; req.resolvedAt = msg.timestamp; }
      updateApprovalBadge();
      if (panelMode === 'approval') renderApprovalPanel();
      break;
    }
    case 'chart_data': {
      addChartData(msg);
      break;
    }
    case 'schedule_list': {
      scheduleData = msg.schedules || [];
      scheduleReports = msg.reports || [];
      updateScheduleBadge();
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'schedule_updated': {
      const idx = scheduleData.findIndex(s => s.id === msg.schedule.id);
      if (idx >= 0) scheduleData[idx] = msg.schedule;
      else scheduleData.push(msg.schedule);
      updateScheduleBadge();
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'schedule_deleted': {
      scheduleData = scheduleData.filter(s => s.id !== msg.scheduleId);
      updateScheduleBadge();
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'auto_report_start': {
      autoReportRunning = msg.scheduleId;
      const bar = document.getElementById('auto-report-bar');
      bar.classList.add('active');
      document.getElementById('arb-name').textContent = msg.scheduleName || '';
      // 스케줄 카드 상태 업데이트
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'auto_report': {
      autoReportRunning = null;
      document.getElementById('auto-report-bar').classList.remove('active');
      // 리포트 저장
      scheduleReports.unshift(msg);
      if (scheduleReports.length > 20) scheduleReports.length = 20;
      // 스케줄 카드 lastReportPreview 업데이트
      const sched = scheduleData.find(s => s.id === msg.scheduleId);
      if (sched) {
        sched.lastRun = msg.timestamp;
        sched.lastReportPreview = msg.preview;
      }
      // 회의록에 기록
      addMinutesEntry({
        type: 'chat',
        agentId: msg.agentId ?? -1,
        agentName: `[자동] ${msg.agentName || msg.scheduleName}`,
        content: `[자동 리포트: ${msg.scheduleName}] ${(msg.preview || '').slice(0, 150)}`,
      });
      updateScheduleBadge();
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'auto_report_error': {
      autoReportRunning = null;
      document.getElementById('auto-report-bar').classList.remove('active');
      break;
    }
    case 'trigger_list': {
      triggerData = msg.triggers || [];
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'trigger_updated': {
      const tidx = triggerData.findIndex(t => t.id === msg.trigger.id);
      if (tidx >= 0) triggerData[tidx] = msg.trigger;
      else triggerData.push(msg.trigger);
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'trigger_deleted': {
      triggerData = triggerData.filter(t => t.id !== msg.triggerId);
      if (panelMode === 'schedule') renderSchedulePanel();
      break;
    }
    case 'trigger_fired': {
      // 토스트 알림
      showTriggerToast(msg);
      // 회의록에 기록
      addMinutesEntry({
        type: 'chat',
        agentId: msg.targetAgentId,
        agentName: `[트리거] ${AGENT_NAME_MAP[msg.targetAgentId] || ''}`,
        content: `[${msg.triggerName}] ${msg.summary}`,
      });
      break;
    }
    case 'error': {
      const msgs = chatHistories[currentChatAgent];
      msgs.push({ role: 'agent', agentId: msg.agentId || -1, name: '시스템', content: msg.message });
      isStreaming = false;
      document.getElementById('chat-send').disabled = false;
      renderMessages();
      break;
    }
  }

  // source: 'scheduled' 이벤트 처리 — 자동 분석의 스트리밍은 에이전트 상태만 업데이트
  if (msg.source === 'scheduled') {
    if (msg.type === 'stream_start') setAgentLiveStatus(msg.agentId, 'responding');
    if (msg.type === 'tool_activity') {
      setAgentLiveStatus(msg.agentId, 'querying');
      setTimeout(() => { if (agentLiveStatus[msg.agentId]?.status === 'querying') setAgentLiveStatus(msg.agentId, 'responding'); }, 2000);
    }
    if (msg.type === 'stream_end') setAgentLiveStatus(msg.agentId, 'idle');
    if (msg.type === 'meeting_start') { [0,1,2,3,4].forEach(id => setAgentLiveStatus(id, 'meeting')); triggerCanvasMeeting(); }
    if (msg.type === 'meeting_end') { [0,1,2,3,4].forEach(id => setAgentLiveStatus(id, 'idle')); endCanvasMeeting(); }
    // consultation은 switch-case에서 처리됨
  }
}

// ── Chart Panel (데이터 시각화) ──────────────────────────────────────────────

const chartDataStore = []; // 최근 차트 데이터 (최대 30개)
let chartInstances = {};   // canvasId → Chart instance
let chartFilter = 'all';   // 'all' | agentId(number)
let chartIdCounter = 0;

function addChartData(msg) {
  msg._chartId = ++chartIdCounter;
  chartDataStore.unshift(msg);
  if (chartDataStore.length > 30) chartDataStore.length = 30;
  updateChartBadge();
  if (panelMode === 'chart') renderChartPanel();
}

function updateChartBadge() {
  const badge = document.getElementById('chart-badge');
  if (chartDataStore.length > 0) {
    badge.textContent = chartDataStore.length;
    badge.className = 'panel-badge chart-count';
  } else {
    badge.textContent = '';
    badge.className = 'panel-badge empty';
  }
}

function setChartFilter(f) {
  chartFilter = f;
  renderChartPanel();
}

function renderChartPanel() {
  const panel = document.getElementById('chart-panel');
  if (!panel) return;
  panel.style.display = 'flex';

  // 기존 차트 인스턴스 파괴
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};

  let filtered = chartDataStore;
  if (typeof chartFilter === 'number') {
    filtered = chartDataStore.filter(d => d.agentId === chartFilter);
  }

  let html = '';

  // 필터 바
  const agentIds = [...new Set(chartDataStore.map(d => d.agentId))];
  html += `<div class="chart-filter-bar">
    <button class="chart-filter-btn ${chartFilter === 'all' ? 'active' : ''}" onclick="setChartFilter('all')">전체</button>`;
  agentIds.forEach(id => {
    const name = AGENT_NAME_MAP[id] || '';
    const color = AGENT_COLOR_MAP[id] || '#888';
    html += `<button class="chart-filter-btn ${chartFilter === id ? 'active' : ''}" onclick="setChartFilter(${id})">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color};margin-right:3px;vertical-align:middle"></span>${name}
    </button>`;
  });
  html += `</div>`;

  if (filtered.length === 0) {
    html += `<div class="chart-empty">
      <div style="font-size:36px;margin-bottom:12px">📊</div>
      <div style="font-size:15px;font-weight:600;color:#c9d1d9;margin-bottom:8px">차트가 없습니다</div>
      <div>에이전트가 데이터를 조회하면 자동으로 차트가 생성됩니다.</div>
    </div>`;
    panel.innerHTML = html;
    return;
  }

  // 차트 카드
  filtered.forEach(d => {
    const color = AGENT_COLOR_MAP[d.agentId] || '#888';
    const name = d.agentName || AGENT_NAME_MAP[d.agentId] || '';
    const time = d.timestamp ? new Date(d.timestamp).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' }) : '';
    const canvasId = `chart-cv-${d._chartId}`;

    html += `<div class="chart-card">
      <div class="chart-card-header">
        <span class="chart-card-title">${escapeHtml(d.title || '')}</span>
        <div class="chart-card-meta">
          <div class="chart-card-agent">
            <span class="chart-card-dot" style="background:${color}"></span>
            <span style="color:${color}">${name}</span>
          </div>
          <span>${time}</span>
        </div>
      </div>
      <canvas id="${canvasId}" height="200"></canvas>
    </div>`;
  });

  panel.innerHTML = html;

  // Chart.js 인스턴스 생성 (DOM 업데이트 후)
  requestAnimationFrame(() => {
    filtered.forEach(d => {
      const canvasId = `chart-cv-${d._chartId}`;
      const canvas = document.getElementById(canvasId);
      if (!canvas || !d.chartType) return;
      try {
        chartInstances[canvasId] = createChart(canvas, d);
      } catch (err) {
        console.warn('Chart render error:', err);
      }
    });
  });
}

function createChart(canvas, data) {
  const ctx = canvas.getContext('2d');
  const isDark = true;

  const baseOpts = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 600 },
    plugins: {
      legend: {
        display: (data.datasets && data.datasets.length > 1) || data.chartType === 'doughnut' || data.chartType === 'radar',
        position: 'bottom',
        labels: { color: '#8b949e', font: { size: 10 }, boxWidth: 10, padding: 8 },
      },
      tooltip: {
        backgroundColor: '#161b22',
        titleColor: '#e6edf3',
        bodyColor: '#c9d1d9',
        borderColor: '#30363d',
        borderWidth: 1,
        titleFont: { size: 11 },
        bodyFont: { size: 11 },
        padding: 8,
        cornerRadius: 6,
      },
    },
    scales: {},
  };

  // 축 설정 (bar, line, scatter)
  if (['bar', 'line', 'scatter'].includes(data.chartType)) {
    baseOpts.scales = {
      x: {
        ticks: { color: '#8b949e', font: { size: 9 }, maxRotation: 45 },
        grid: { color: '#21262d' },
        border: { color: '#30363d' },
      },
      y: {
        ticks: { color: '#8b949e', font: { size: 9 } },
        grid: { color: '#21262d' },
        border: { color: '#30363d' },
        reverse: data.options?.reverseY || false,
      },
    };
  }

  // 레이더 설정
  if (data.chartType === 'radar') {
    baseOpts.scales = {
      r: {
        angleLines: { color: '#21262d' },
        grid: { color: '#21262d' },
        pointLabels: { color: '#c9d1d9', font: { size: 10 } },
        ticks: { color: '#8b949e', backdropColor: 'transparent', font: { size: 9 } },
      },
    };
  }

  const config = {
    type: data.chartType === 'scatter' ? 'scatter' : data.chartType,
    data: {
      labels: data.labels || [],
      datasets: (data.datasets || []).map(ds => ({
        ...ds,
        pointBackgroundColor: ds.pointBackgroundColor || ds.borderColor,
      })),
    },
    options: baseOpts,
  };

  return new Chart(ctx, config);
}

let scheduleData = [];
let scheduleReports = [];
let autoReportRunning = null;
let scheduleFormOpen = false;

const AGENT_NAME_MAP = { 0: '한준혁', 1: '이서연', 2: '김하늘', 3: '박도현', 4: '최재원' };
const AGENT_COLOR_MAP = { 0: '#4A85D8', 1: '#3AB87A', 2: '#D4A017', 3: '#E05040', 4: '#9055D8' };
const SCHED_TYPE_LABELS = { chat: '1:1 분석', meeting: '전체 회의' };

function requestScheduleList() {

    ws.send(JSON.stringify({ type: 'schedule_list' }));
  }
}

function updateScheduleBadge() {
  const badge = document.getElementById('schedule-badge');
  const enabled = scheduleData.filter(s => s.enabled).length;
  if (enabled > 0) {
    badge.textContent = enabled;
    badge.className = 'panel-badge schedule-count';
  } else {
    badge.textContent = '';
    badge.className = 'panel-badge empty';
  }
}

function formatInterval(minutes) {
  if (minutes < 60) return `${minutes}분`;
  if (minutes < 1440) return `${(minutes/60).toFixed(0)}시간`;
  if (minutes < 10080) return `${(minutes/1440).toFixed(0)}일`;
  return `${(minutes/10080).toFixed(0)}주`;
}

function formatTimeAgo(isoStr) {
  if (!isoStr) return '없음';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '방금 전';
  if (mins < 60) return `${mins}분 전`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}시간 전`;
  return `${Math.floor(hrs/24)}일 전`;
}

  const panel = document.getElementById('schedule-panel');
  if (!panel) return;
  panel.style.display = 'flex';

  let html = '';

  // 자동 분석 진행 중 알림

      <span style="animation:statusPulse 1.5s ease-in-out infinite">⏳</span>
      <span>${rSched ? rSched.name : ''} 분석 진행 중...</span>

      const typeLabel = SCHED_TYPE_LABELS[s.type] || s.type;
      const canAct = ws && ws.readyState === WebSocket.OPEN && !isRunning;

      html += `<div class="schedule-card ${statusCls}">
        <div class="sched-header">
          <span class="sched-name">${escapeHtml(s.name)}</span>
          <div class="sched-toggle ${s.enabled ? 'on' : ''}" onclick="toggleSchedule('${s.id}',${!s.enabled})" title="${s.enabled ? '비활성화' : '활성화'}"></div>
        </div>

          <span class="sched-agent-dot" style="background:${agentColor}"></span>

        <div class="sched-instruction">${escapeHtml(s.instruction)}</div>

          <span class="sched-interval">🔄 ${formatInterval(s.intervalMinutes)} 간격</span>
          <span>최근: ${formatTimeAgo(s.lastRun)}</span>
        </div>
        <div class="sched-actions">
          <button class="sched-btn run-now" ${canAct?'':'disabled'} onclick="runScheduleNow('${s.id}')">▶ 지금 실행</button>

        </div>
        ${s.lastReportPreview ? `<div class="sched-last-report">${escapeHtml(s.lastReportPreview)}</div>` : ''}
      </div>`;
    }
  }

  // 추가 폼
  html += `<div class="sched-add-form ${scheduleFormOpen ? 'open' : ''}" id="sched-add-form">
    <span class="sched-form-label">스케줄 이름</span>
    <input class="sched-form-input" id="sched-f-name" placeholder="예: 일일 트렌드 분석">
    <span class="sched-form-label">유형</span>
    <select class="sched-form-select" id="sched-f-type" onchange="onSchedTypeChange()">
      <option value="chat">1:1 에이전트 분석</option>
      <option value="meeting">전체 회의</option>
    </select>
    <div id="sched-f-agent-row">
      <span class="sched-form-label">에이전트</span>
      <select class="sched-form-select" id="sched-f-agent">
        <option value="1">이서연 (경쟁사)</option>
        <option value="2">김하늘 (트렌드)</option>
        <option value="3">박도현 (상품기획)</option>
        <option value="4">최���원 (판매분석)</option>
      </select>
    </div>
    <span class="sched-form-label">분석 지시</span>
    <textarea class="sched-form-textarea" id="sched-f-instruction" placeholder="에이전트에게 보낼 분석 지시를 입력하세요"></textarea>

      <select class="sched-form-select" id="sched-f-unit">
        <option value="1">분</option>
        <option value="60" selected>시간</option>
        <option value="1440">일</option>
        <option value="10080">주</option>
      </select>
    </div>
    <div class="sched-form-actions">
      <button class="sched-btn" onclick="scheduleFormOpen=false;renderSchedulePanel()">취소</button>
      <button class="sched-btn run-now" onclick="submitNewSchedule()">추가</button>
    </div>
  </div>`;

  if (!scheduleFormOpen) {
    html += `<button class="sched-add-btn" onclick="scheduleFormOpen=true;renderSchedulePanel()">+ 새 스케줄 추가</button>`;
  }

  // 자동 트리거 섹션
  html += `<div class="trigger-section-title">🔔 자동 트리거 (조건부 연쇄 분석)</div>`;
  html += renderTriggerSection();

  // 최근 리포트 이력
  if (scheduleReports.length > 0) {
    html += `<div style="margin-top:8px;font-size:11px;color:#484f58;font-weight:600;letter-spacing:1px">최근 자동 리포트</div>`;
    for (const r of scheduleReports.slice(0, 5)) {
      const color = r.agentId !== null ? (AGENT_COLOR_MAP[r.agentId] || '#888') : '#58a6ff';
      const time = formatTimeAgo(r.timestamp);
      html += `<div style="background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px 10px;border-left:3px solid ${color}">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
          <span style="color:${color};font-weight:600">${escapeHtml(r.scheduleName||'')}</span>
          <span style="color:#484f58">${time}</span>
        </div>
        <div style="font-size:11px;color:#8b949e;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${escapeHtml((r.preview||r.content||'').slice(0,200))}</div>
      </div>`;
    }
  }

  panel.innerHTML = html;
}

  const type = document.getElementById('sched-f-type').value;
  const row = document.getElementById('sched-f-agent-row');
  row.style.display = type === 'chat' ? '' : 'none';
}

function toggleSchedule(id, enabled) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'schedule_toggle', scheduleId: id, enabled }));
  }
}

function deleteSchedule(id) {
  if (!confirm('이 스케줄을 삭제할까요?')) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'schedule_delete', scheduleId: id }));
  }
}

function runScheduleNow(id) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'schedule_run_now', scheduleId: id }));
  }
}

function submitNewSchedule() {
  const name = document.getElementById('sched-f-name').value.trim();
  const type = document.getElementById('sched-f-type').value;
  const agentId = type === 'chat' ? parseInt(document.getElementById('sched-f-agent').value) : null;
  const instruction = document.getElementById('sched-f-instruction').value.trim();
  const intervalVal = parseInt(document.getElementById('sched-f-interval').value) || 1;
  const unit = parseInt(document.getElementById('sched-f-unit').value);
  const intervalMinutes = intervalVal * unit;

  if (!name || !instruction) { alert('이름과 분석 지시를 입력하세요.'); return; }

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type: 'schedule_create',
      schedule: { name, type, agentId, instruction, intervalMinutes }
    }));
  }
  scheduleFormOpen = false;
  renderSchedulePanel();
}

// ── 리포트 내보내기 ─────────────────────────────────────────────────────────

function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportChat(format) {
  const msgs = chatHistories[currentChatAgent] || [];
  if (msgs.length === 0) { alert('내보낼 대화가 없습니다.'); return; }

  const agentName = agent ? agent.name : '';
  const date = new Date().toISOString().split('T')[0];
  const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

  if (format === 'md') {
    let md = `# ${agentName} — 대화 리포트\n\n`;

// ── Trigger UI ──────────────────────────────────────────────────────────────

let triggerData = [];

function requestTriggerList() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'trigger_list' }));
  }
}

function toggleTrigger(id, enabled) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'trigger_toggle', triggerId: id, enabled }));
  }
}

function deleteTriggerItem(id) {
  if (!confirm('이 트리거를 삭제할까요?')) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'trigger_delete', triggerId: id }));
  }
}

function renderTriggerSection() {
  if (triggerData.length === 0) return '<div style="color:#484f58;font-size:11px;text-align:center;padding:8px">트리거가 없습니다</div>';

  return triggerData.map(t => {
    const srcColor = AGENT_COLOR_MAP[t.sourceAgentId] || '#888';
    const tgtColor = AGENT_COLOR_MAP[t.targetAgentId] || '#888';
    const srcName = AGENT_NAME_MAP[t.sourceAgentId] || '';
    const tgtName = AGENT_NAME_MAP[t.targetAgentId] || '';
    const statusCls = t.enabled ? 'enabled' : 'disabled';

    return `<div class="trigger-card ${statusCls}">
      <div class="trig-header">
        <span class="trig-name">${escapeHtml(t.name)}</span>
        <div class="sched-toggle ${t.enabled ? 'on' : ''}" onclick="toggleTrigger('${t.id}',${!t.enabled})" title="${t.enabled ? '비활성화' : '활성화'}"></div>
      </div>
      <div class="trig-desc">${escapeHtml(t.description || '')}</div>
      <div class="trig-flow">
        <span class="trig-flow-agent" style="color:${srcColor}">${srcName}</span>
        <span class="trig-flow-arrow">→</span>
        <span style="color:#d29922">조건 감지</span>
        <span class="trig-flow-arrow">→</span>
        <span class="trig-flow-agent" style="color:${tgtColor}">${tgtName}</span>
      </div>
      <div class="trig-meta">
        <span>발동 ${t.triggerCount || 0}회${t.lastTriggered ? ' · 최근 ' + formatTimeAgo(t.lastTriggered) : ''}</span>
        <span>쿨다운 ${t.cooldownMinutes || 30}분</span>
      </div>
      <div class="trig-actions">
        <button class="sched-btn delete" onclick="deleteTriggerItem('${t.id}')" style="padding:3px 8px;font-size:10px">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function showTriggerToast(msg) {
  const srcName = AGENT_NAME_MAP[msg.sourceAgentId] || '';
  const tgtName = AGENT_NAME_MAP[msg.targetAgentId] || '';
  const toast = document.createElement('div');
  toast.className = 'trigger-fired-toast';
  toast.innerHTML = `
    <span class="toast-close" onclick="this.parentElement.remove()">×</span>
    <div class="toast-title">🔔 트리거 발동: ${escapeHtml(msg.triggerName || '')}</div>
    <div style="font-size:11px;color:#8b949e">${srcName} → ${tgtName}</div>
    <div style="margin-top:4px;font-size:11px">${escapeHtml(msg.summary || '')}</div>
  `;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentElement) toast.remove(); }, 8000);
}

// ── Send ──
function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert('서버에 연결되어 있지 않습니다.\n터미널에서 cd server && npm start 를 실행하세요.');
    return;
  }

  // 사용자 메시지 저장
  chatHistories[currentChatAgent].push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  renderMessages();

  isStreaming = true;
  document.getElementById('chat-send').disabled = true;

  if (currentChatAgent === -1) {
    ws.send(JSON.stringify({ type: 'meeting', content: text }));
    addMinutesEntry({ type: 'instruction', agentId: -1, agentName: '전체 회의', content: `[사용자 → 전체] ${text}` });
  } else {
    ws.send(JSON.stringify({ type: 'chat', agentId: currentChatAgent, content: text }));
    const agentName = AGENT_CFG.find(a => a.id === currentChatAgent)?.name || '';
    addMinutesEntry({ type: 'instruction', agentId: currentChatAgent, agentName, content: `[사용자 → ${agentName}] ${text}` });
  }
}

function clearChat() {
  if (!confirm('대화 내역을 초기화할까요?')) return;
  chatHistories[currentChatAgent] = [];
  renderMessages();
  // 서버에도 알림
  if (ws && ws.readyState === WebSocket.OPEN) {
    fetch(`/api/clear/${currentChatAgent}`, { method: 'POST' }).catch(() => {});
  }
}

// ── Input handling ──
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Canvas click → switch chat ──
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = 1600 / rect.width;
  const scaleY = 900 / rect.height;
  const cx2 = (e.clientX - rect.left) * scaleX;
  const cy2 = (e.clientY - rect.top) * scaleY;

  for (const agent of agents) {
    const ax = agent.state === 'idle' ? agent.hx : agent.x;
    const ay = agent.state === 'idle' ? agent.hy : agent.y;
    if (Math.abs(cx2 - ax) < 32 && cy2 > ay - 100 && cy2 < ay + 20) {
      switchChat(agent.id);
      document.getElementById('chat-input').focus();
      return;
    }
  }
});

// ── Init chat ──
buildTabs();
updateChatHeader();
renderMessages();

// ── Updated UI Panel (clickable cards) ──
updateUI();
loop();

// WebSocket은 loop 이후에 연결 (실패해도 캔버스에 영향 없음)
connectWS();
</script>
