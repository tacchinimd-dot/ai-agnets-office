<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI Agents Office</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 10px; font-family: 'Segoe UI', sans-serif; }
  #main-container { display: flex; gap: 0; align-items: flex-start; }
  #left-side { display: flex; flex-direction: column; align-items: center; }
  canvas { display: block; border: 2px solid #333; border-radius: 4px 0 0 4px; cursor: default; }
  #ui-panel { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
  .agent-card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 10px 16px; min-width: 180px; color: #e0e0e0; cursor: pointer; transition: border-color .2s; }
  .agent-card:hover { border-color: #3a6aaa; }
  .agent-card.active { border-color: #5599ff; box-shadow: 0 0 8px rgba(85,153,255,0.3); }
  .agent-card .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .agent-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .agent-name { font-weight: bold; font-size: 14px; }
  .agent-role { font-size: 11px; color: #888; margin-bottom: 4px; }
  .agent-status { font-size: 12px; color: #adf; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; animation: statusPulse 2s ease-in-out infinite; }
  @keyframes statusPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-indicator { width: 7px; height: 7px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
  .card-skills { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 4px; }
  .skill-tag {
    font-size: 9px; padding: 1px 5px; border-radius: 8px;
    border: 1px solid; white-space: nowrap; font-weight: 600;
  }

  /* ── Chat Panel ── */
  #chat-panel {
    width: 400px; height: 904px;
    background: #0d1117; border: 2px solid #333; border-left: 1px solid #333;
    border-radius: 0 4px 4px 0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #chat-tabs {
    display: flex; flex-wrap: wrap; gap: 0; background: #161b22;
    border-bottom: 1px solid #30363d; padding: 6px 8px 0; min-height: 40px;
  }
  .chat-tab {
    padding: 6px 12px; font-size: 12px; color: #8b949e; background: transparent;
    border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0;
    cursor: pointer; font-family: 'Segoe UI', sans-serif; white-space: nowrap;
    transition: all .15s;
  }
  .chat-tab:hover { color: #c9d1d9; background: rgba(255,255,255,0.04); }
  .chat-tab.active { color: #f0f6fc; background: #0d1117; border-color: #30363d; font-weight: 600; }
  .chat-tab .tab-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  #chat-header {
    padding: 10px 16px; background: #161b22; border-bottom: 1px solid #30363d;
    color: #c9d1d9; font-size: 13px; display: flex; justify-content: space-between; align-items: center;
  }
  #chat-header-name { font-weight: 700; font-size: 15px; }
  #chat-header-role { font-size: 11px; color: #8b949e; }
  #chat-clear-btn {
    background: rgba(255,255,255,0.06); border: 1px solid #30363d; color: #8b949e;
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
  }
  #chat-clear-btn:hover { color: #f85149; border-color: #f85149; }

  #chat-messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: #30363d #0d1117;
  }
  #chat-messages::-webkit-scrollbar { width: 6px; }
  #chat-messages::-webkit-scrollbar-track { background: #0d1117; }
  #chat-messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .chat-msg {
    max-width: 90%; padding: 10px 14px; border-radius: 12px;
    font-size: 13px; line-height: 1.6; word-break: break-word;
    animation: msgIn .2s ease-out;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg.user { align-self: flex-end; background: #1f3a5f; color: #d2e3fc; border-bottom-right-radius: 4px; }
  .chat-msg.agent { align-self: flex-start; background: #1c2333; color: #c9d1d9; border-bottom-left-radius: 4px; border-left: 3px solid #555; }
  .chat-msg .msg-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
  .chat-msg.typing { color: #8b949e; font-style: italic; }

  .chat-welcome { color: #8b949e; text-align: center; padding: 40px 20px; font-size: 13px; line-height: 1.8; }
  .chat-welcome .welcome-icon { font-size: 32px; margin-bottom: 12px; }
  .chat-welcome .welcome-name { font-size: 18px; font-weight: 700; color: #c9d1d9; }

  #chat-input-area {
    display: flex; gap: 8px; padding: 12px; background: #161b22;
    border-top: 1px solid #30363d;
  }
  #chat-input {
    flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
    color: #c9d1d9; padding: 10px 14px; font-size: 13px; font-family: 'Segoe UI', sans-serif;
    resize: none; outline: none; min-height: 42px; max-height: 120px;
  }
  #chat-input:focus { border-color: #58a6ff; }
  #chat-input::placeholder { color: #484f58; }
  #chat-send {
    background: #238636; border: none; color: #fff; padding: 10px 16px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
    font-family: 'Segoe UI', sans-serif; white-space: nowrap;
    transition: background .15s;
  }
  #chat-send:hover { background: #2ea043; }
  #chat-send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

  #connection-status {
    padding: 4px 12px; font-size: 10px; text-align: center;
    background: #161b22; color: #8b949e; border-top: 1px solid #30363d;
  }
  #connection-status.connected { color: #3fb950; }
  #connection-status.disconnected { color: #f85149; }

  /* ── Panel Mode Toggle ── */
  #panel-mode-toggle {
    display: flex; gap: 0; padding: 6px 8px; background: #161b22;
    border-bottom: 1px solid #30363d;
  }
  .panel-mode-btn {
    flex: 1; padding: 6px 0; font-size: 12px; font-weight: 600;
    color: #8b949e; background: transparent; border: 1px solid transparent;
    border-radius: 6px; cursor: pointer; font-family: 'Segoe UI', sans-serif;
    transition: all .15s; text-align: center;
  }
  .panel-mode-btn:hover { color: #c9d1d9; background: rgba(255,255,255,0.04); }
  .panel-mode-btn.active {
    color: #f0f6fc; background: #0d1117;
    border-color: #30363d;
  }

  /* ── Results Panel ── */
  #results-panel {
    flex: 1; overflow-y: auto; padding: 12px; display: none;
    flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: #30363d #0d1117;
  }
  #results-panel::-webkit-scrollbar { width: 6px; }
  #results-panel::-webkit-scrollbar-track { background: #0d1117; }
  #results-panel::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .results-empty {
    color: #8b949e; text-align: center; padding: 60px 20px; font-size: 13px; line-height: 1.8;
  }
  .results-empty .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* Agent group in results */
  .result-agent-group { margin-bottom: 8px; }
  .result-agent-header {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    font-size: 12px; font-weight: 700; color: #c9d1d9;
    border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 6px;
  }
  .result-agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .result-card {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 10px 12px; margin-bottom: 6px;
    animation: msgIn .2s ease-out; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .result-card:hover { border-color: #30363d; background: #1c2128; }
  .result-card.error { border-left: 3px solid #f85149; }
  .result-card.success { border-left: 3px solid #3fb950; }

  .result-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .result-tool-label { font-size: 13px; font-weight: 600; color: #e6edf3; }
  .result-time { font-size: 10px; color: #484f58; }

  .result-input {
    font-size: 11px; color: #8b949e; margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result-preview {
    font-size: 12px; color: #adbac7; line-height: 1.5;
    padding: 6px 8px; background: rgba(0,0,0,0.2); border-radius: 4px;
  }
  .result-size {
    font-size: 10px; color: #484f58; margin-top: 4px; text-align: right;
  }

  .result-card-detail {
    display: none; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid #21262d;
  }
  .result-card.expanded .result-card-detail { display: block; }

  /* Results filter */
  #results-filter {
    display: flex; gap: 4px; padding: 8px 12px; background: #0d1117;
    border-bottom: 1px solid #21262d; flex-wrap: wrap;
  }
  .results-filter-btn {
    padding: 3px 8px; font-size: 10px; color: #8b949e;
    background: transparent; border: 1px solid #21262d; border-radius: 12px;
    cursor: pointer; font-family: 'Segoe UI', sans-serif; transition: all .15s;
  }
  .results-filter-btn:hover { color: #c9d1d9; border-color: #30363d; }
  .results-filter-btn.active { color: #f0f6fc; background: #21262d; border-color: #30363d; }

  /* Results count badge */
  .results-badge {
    display: inline-block; min-width: 16px; height: 16px; line-height: 16px;
    padding: 0 5px; font-size: 10px; font-weight: 700; text-align: center;
    background: #388bfd; color: #fff; border-radius: 8px; margin-left: 4px;
  }
  .results-badge.empty { background: transparent; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed; display: none; pointer-events: none; z-index: 9999;
    background: rgba(8, 12, 28, 0.97);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 16px 20px;
    min-width: 270px; max-width: 330px;
    color: #dde4f4; font-size: 13px; line-height: 1.5;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  }
  #tooltip .tt-name { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
  #tooltip .tt-badge { font-size: 10px; font-weight: 600; letter-spacing: 1px; opacity: .75; margin-bottom: 10px; }
  #tooltip hr { border: none; border-top: 1px solid rgba(255,255,255,0.09); margin: 8px 0; }
  #tooltip .tt-sec { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: #8899cc; margin: 10px 0 5px; text-transform: uppercase; }
  #tooltip .tt-item { font-size: 12px; padding-left: 14px; position: relative; margin-bottom: 4px; color: #c8d4ee; }
  #tooltip .tt-item::before { content: '›'; position: absolute; left: 2px; color: #5577cc; }
  #tooltip .tt-pending .tt-item::before { color: #cc8844; }
  #tooltip .tt-q {
    font-size: 12px; font-style: italic; color: #ffd870; margin-top: 10px;
    padding: 8px 12px; background: rgba(255,216,112,0.07);
    border-left: 3px solid rgba(255,216,112,0.45); border-radius: 0 6px 6px 0;
  }
  #tooltip .tt-status {
    font-size: 11px; margin-top: 10px; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08); color: #88ee99;
  }
  #tooltip .tt-status span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; background: #88ee99; }
</style>
</head>
<body>
<div id="main-container">
  <div id="left-side">
    <canvas id="c" width="1600" height="900"></canvas>
    <div id="ui-panel"></div>
  </div>
  <div id="chat-panel">
    <div id="panel-mode-toggle">
      <button class="panel-mode-btn active" onclick="setPanelMode('chat')">💬 채팅</button>
      <button class="panel-mode-btn" onclick="setPanelMode('results')">📊 결과물<span id="results-badge" class="results-badge empty"></span></button>
    </div>
    <div id="chat-tabs"></div>
    <div id="chat-header">
      <div>
        <div id="chat-header-name">AI Office Chat</div>
        <div id="chat-header-role">에이전트를 선택하세요</div>
      </div>
      <button id="chat-clear-btn" onclick="clearChat()">대화 초기화</button>
    </div>
    <div id="chat-messages"></div>
    <div id="results-filter"></div>
    <div id="results-panel"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="메시지를 입력하세요... (Enter로 전송, Shift+Enter 줄바꿈)" rows="1"></textarea>
      <button id="chat-send" onclick="sendMessage()">전송</button>
    </div>
    <div id="connection-status" class="disconnected">서버 연결 대기중</div>
  </div>
</div>
<div id="tooltip"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Agent configs ─────────────────────────────────────────────────────────────
const AGENT_CFG = [
  {id:0, name:'한준혁', gender:'M', skin:'#F0C090', hair:'#1A1008', hairStyle:'short',
   jacketC:'#0d1f40', pantsC:'#0d1f40', tieC:'#b8960c', shoeC:'#080808',
   hx:155, hy:290, role:'CEO', color:'#4A85D8'},

  {id:1, name:'이서연', gender:'F', skin:'#F5C5A3', hair:'#3D2010', hairStyle:'long',
   jacketC:'#133320', skirtC:'#133320', blouseC:'#f0fff4', shoeC:'#0a0a18',
   hx:600, hy:370, role:'Market Agent', color:'#3AB87A'},

  {id:2, name:'김하늘', gender:'F', skin:'#DFA882', hair:'#111111', hairStyle:'bun',
   jacketC:'#2e2806', skirtC:'#2e2806', blouseC:'#fffef0', shoeC:'#0a0a0a',
   hx:900, hy:370, role:'Trend Agent', color:'#D4A017'},

  {id:3, name:'박도현', gender:'M', skin:'#E8B090', hair:'#2A1A10', hairStyle:'medium',
   jacketC:'#3a0c0c', pantsC:'#3a0c0c', tieC:'#cc3322', shoeC:'#080808',
   hx:600, hy:620, role:'Product Planning', color:'#E05040'},

  {id:4, name:'최재원', gender:'M', skin:'#F0C090', hair:'#1A0E05', hairStyle:'short',
   jacketC:'#1a0c3a', pantsC:'#1a0c3a', tieC:'#7733cc', shoeC:'#080808',
   hx:900, hy:620, role:'Data Analyst', color:'#9055D8'},
];

// ── Skill badges per agent ────────────────────────────────────────────────────
const AGENT_SKILLS = [
  // CEO — 도구 없음
  [],
  // 이서연 (Market) — 경쟁사 크롤링 데이터
  [{ label:'경쟁사', color:'#3AB87A', icon:'🔍' }],
  // 김하늘 (Trend) — 4대 소스
  [{ label:'네이버', color:'#2DB400', icon:'🔎' }, { label:'무신사', color:'#ff4500', icon:'👕' },
   { label:'TikTok', color:'#ee1d52', icon:'🎵' }, { label:'구글', color:'#4285f4', icon:'🌐' }],
  // 박도현 (Product) — Snowflake 상품
  [{ label:'상품DB', color:'#E05040', icon:'📦' }, { label:'원가', color:'#cc7733', icon:'💰' }],
  // 최재원 (Data) — Snowflake 판매
  [{ label:'판매DB', color:'#9055D8', icon:'📊' }],
];

// ── Live status tracking ─────────────────────────────────────────────────────
// Possible: 'idle' | 'responding' | 'querying' | 'meeting' | 'walking'
const agentLiveStatus = {
  0: { status: 'idle', label: '업무 중', color: '#3fb950' },
  1: { status: 'idle', label: '업무 중', color: '#3fb950' },
  2: { status: 'idle', label: '업무 중', color: '#3fb950' },
  3: { status: 'idle', label: '업무 중', color: '#3fb950' },
  4: { status: 'idle', label: '업무 중', color: '#3fb950' },
};

function setAgentLiveStatus(agentId, status) {
  const map = {
    idle:       { label: '업무 중',       color: '#3fb950' },
    responding: { label: '응답 중',       color: '#58a6ff' },
    querying:   { label: '데이터 조회 중', color: '#d29922' },
    meeting:    { label: '회의 중',       color: '#bc8cff' },
    walking:    { label: '이동 중',       color: '#8b949e' },
  };
  const info = map[status] || map.idle;
  agentLiveStatus[agentId] = { status, label: info.label, color: info.color };
}

// ── Korean role / task info for tooltip ───────────────────────────────────────
const AGENT_INFO = [
  {
    title: '전략 총괄',  titleSub: 'Strategy Director',
    roles: ['전체 전략 방향 정리', '의사결정 구조 설계', '옵션 비교 및 정리'],
    current: ['시즌 전략 방향 수립 중', 'Agent 간 업무 조율'],
    pending: ['전략 옵션 도출 (A/B안 정리)', '우선순위 및 방향성 제안'],
    question: null
  },
  {
    title: '시장/경쟁 분석가', titleSub: 'Market Intelligence Manager',
    roles: ['산업 및 경쟁사 분석', '시장 내 포지셔닝 파악'],
    current: ['경쟁 브랜드 상품/가격 분석 중', '플랫폼 트렌드 모니터링'],
    pending: ['GWP·채널 전략 분석', '무신사/29CM 트렌드 보고서 작성'],
    question: '"브랜드들은 지금 무엇을 하고 있는가?"'
  },
  {
    title: '고객 트렌드 분석가', titleSub: 'Consumer Insight Analyst',
    roles: ['소비자 라이프스타일 분석', '문화 및 취향 변화 파악'],
    current: ['SNS·콘텐츠 트렌드 분석 중', '라이프스타일 변화 조사'],
    pending: ['패션 외 트렌드 분석 (카페·여행)', '트렌드 → 인사이트 보고서 작성'],
    question: '"사람들은 지금 어떻게 살고 있는가?"'
  },
  {
    title: '상품 기획 MD', titleSub: 'Product Planning Manager',
    roles: ['전략을 상품으로 변환', '카테고리 및 소재 구조 설계'],
    current: ['카테고리 전략 수립 중', 'Market+Trend 인사이트 통합'],
    pending: ['SKU 기획 및 구성', '소재 및 기능 구조 설계'],
    question: '"그래서 우리는 무엇을 만들어야 하는가?"'
  },
  {
    title: '데이터 분석가', titleSub: 'Data Analyst',
    roles: ['전략 검증 및 성과 분석', '데이터 기반 의사결정 지원'],
    current: ['판매 데이터 분석 중', 'SKU 효율 분석'],
    pending: ['카테고리별 성과 분석', '전략 적합성 검증'],
    question: '"이 전략이 실제로 맞는가?"'
  }
];

const MR = [
  { x:1290, y:60,  w:285, h:400, label:'MEETING ROOM 1', tableX:1432, tableY:255,
    seats:[{x:1362,y:300},{x:1432,y:300},{x:1502,y:300},{x:1362,y:220},{x:1432,y:220},{x:1502,y:220}] },
  { x:1290, y:460, w:285, h:400, label:'MEETING ROOM 2', tableX:1432, tableY:655,
    seats:[{x:1362,y:700},{x:1432,y:700},{x:1502,y:700},{x:1362,y:620},{x:1432,y:620},{x:1502,y:620}] }
];

// ── Pre-render wood background ────────────────────────────────────────────────
const woodOff = document.createElement('canvas');
woodOff.width = 1600; woodOff.height = 900;
const wctx = woodOff.getContext('2d');
(function buildWood() {
  function seededRng(seed) {
    let s = seed;
    return function() { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
  }
  const rng = seededRng(42);
  const plankH = 38;
  const baseColors = ['#8B5E3C','#7A5230','#956643','#A06835','#8E6040'];
  for (let i = 0; i < Math.ceil(900/plankH)+1; i++) {
    const py = i * plankH;
    wctx.fillStyle = baseColors[i % baseColors.length];
    wctx.fillRect(0, py, 1600, plankH);
    for (let g = 0; g < 8+Math.floor(rng()*6); g++) {
      const gx = rng()*1600, thick = 0.3+rng()*1.2, alpha = 0.05+rng()*0.12;
      wctx.strokeStyle = 'rgba(0,0,0,'+alpha+')'; wctx.lineWidth = thick;
      wctx.beginPath();
      wctx.moveTo(gx, py);
      wctx.bezierCurveTo(gx+rng()*20-10, py+plankH*.3, gx+rng()*6-3, py+plankH*.7, gx+rng()*10-5, py+plankH);
      wctx.stroke();
    }
    wctx.fillStyle = 'rgba(0,0,0,0.25)'; wctx.fillRect(0, py+plankH-2, 1600, 2);
    wctx.fillStyle = 'rgba(255,255,255,0.05)'; wctx.fillRect(0, py, 1600, 2);
  }
  const vg = wctx.createRadialGradient(800,450,200,800,450,900);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.35)');
  wctx.fillStyle = vg; wctx.fillRect(0,0,1600,900);
})();

// ── Utilities ────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function lightenColor(hex, amt) {
  try { const {r,g,b} = hexToRgb(hex); return 'rgb('+Math.min(255,r+amt)+','+Math.min(255,g+amt)+','+Math.min(255,b+amt)+')'; }
  catch(e) { return hex; }
}
function roundRect(c, x, y, w, h, r, fill, stroke, strokeW) {
  r = Math.min(r, w/2, h/2); if (r<0) r=0;
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
  if (fill) { c.fillStyle = fill; c.fill(); }
  if (stroke) { c.strokeStyle = stroke; c.lineWidth = strokeW||1; c.stroke(); }
}

// ── Agent class ───────────────────────────────────────────────────────────────
class Agent {
  constructor(cfg) {
    Object.assign(this, cfg);
    this.x = cfg.hx; this.y = cfg.hy;
    this.vx = 0; this.vy = 0; this.dir = 1;
    this.state = 'idle'; this.target = null; this.partner = null;
    this.meetingTimer = 0; this.seatIdx = -1; this.mrIdx = -1;
    this.idleTimer = 500 + cfg.id * 80 + Math.floor(Math.random()*200);
    this.blinkTimer = 60 + Math.floor(Math.random()*120);
    this.blinking = false; this.blinkDuration = 0;
    this.walkPhase = Math.random()*Math.PI*2;
    this.statusText = '업무 중';
  }
  setTarget(tx, ty) {
    this.target = { x: Math.max(50, Math.min(1550,tx)), y: Math.max(110, Math.min(850,ty)) };
  }
  update(agents) {
    this.blinkTimer--;
    if (this.blinkTimer <= 0) { this.blinking = true; this.blinkDuration = 6; this.blinkTimer = 80+Math.floor(Math.random()*120); }
    if (this.blinking) { this.blinkDuration--; if (this.blinkDuration<=0) this.blinking=false; }
    if (this.state !== 'idle') this.walkPhase += 0.18;

    switch(this.state) {
      case 'idle': {
        // 랜덤 회의 없음 — 채팅 이벤트에 의해서만 이동
        break;
      }
      case 'toMeeting': {
        this.moveToward();
        if (this.arrivedAtTarget()) {
          this.state = 'inMeeting'; this.statusText = '회의 중'; setAgentLiveStatus(this.id, 'meeting');
        }
        break;
      }
      case 'inMeeting': {
        // 회의 중 대기 — endCanvasMeeting()으로 종료
        break;
      }
      case 'returning': {
        this.moveToward();
        if (this.arrivedAtTarget()) { this.x=this.hx; this.y=this.hy; this.state='idle'; this.idleTimer=400+Math.random()*300; this.target=null; this.statusText='업무 중'; setAgentLiveStatus(this.id, 'idle'); }
        break;
      }
    }
  }
  moveToward() {
    if (!this.target) return;
    const dx=this.target.x-this.x, dy=this.target.y-this.y, d=Math.sqrt(dx*dx+dy*dy);
    if (d<2) return;
    const spd=1.2+this.id*0.12;
    this.vx=(dx/d)*spd; this.vy=(dy/d)*spd;
    this.x+=this.vx; this.y+=this.vy;
    if (Math.abs(this.vx)>0.1) this.dir=this.vx>0?1:-1;
  }
  arrivedAtTarget() {
    if (!this.target) return true;
    const dx=this.target.x-this.x, dy=this.target.y-this.y;
    return Math.sqrt(dx*dx+dy*dy)<4;
  }
}

const agents = AGENT_CFG.map(cfg => new Agent(cfg));

// ── Canvas ↔ Chat event bridge ───────────────────────────────────────────────

let activeMeetingRoom = -1; // -1 = 회의 없음, 0 = MR1, 1 = MR2

// 전체 회의: 5명 모두 회의실 1로 이동
function triggerCanvasMeeting() {
  if (activeMeetingRoom >= 0) return; // 이미 회의 중
  activeMeetingRoom = 0;
  const mr = MR[0];
  agents.forEach((agent, i) => {
    if (agent.state === 'returning') { /* 복귀 중이면 방향 전환 */ }
    agent.seatIdx = i;
    agent.mrIdx = 0;
    agent.state = 'toMeeting';
    agent.setTarget(mr.seats[i].x, mr.seats[i].y);
    agent.statusText = '회의실 이동 중';
    setAgentLiveStatus(agent.id, 'walking');
  });
}

// 전체 회의 종료: 전원 자리 복귀
function endCanvasMeeting() {
  activeMeetingRoom = -1;
  agents.forEach(agent => {
    if (agent.state === 'inMeeting' || agent.state === 'toMeeting') {
      agent.state = 'returning';
      agent.setTarget(agent.hx, agent.hy);
      agent.statusText = '자리로 복귀 중';
      agent.seatIdx = -1;
      agent.mrIdx = -1;
      agent.partner = null;
      setAgentLiveStatus(agent.id, 'walking');
    }
  });
}

// 1:1 대화 시작: 해당 에이전트 모니터에 활성 효과 (chatActiveAgent로 추적)
let chatActiveAgentId = -1;

function setChatActiveAgent(agentId) {
  chatActiveAgentId = agentId;
}

function clearChatActiveAgent() {
  chatActiveAgentId = -1;
}

// ── Face (front view) ─────────────────────────────────────────────────────────
function drawFace(c, cx, cy, agent) {
  const eyeY = cy+2;
  if (!agent.blinking) {
    c.fillStyle='#fff';
    c.beginPath(); c.ellipse(cx-4,eyeY,3.8,4.2,0,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(cx+4,eyeY,3.8,4.2,0,0,Math.PI*2); c.fill();
    c.fillStyle='#160800';
    c.beginPath(); c.arc(cx-4,eyeY+.5,2.1,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(cx+4,eyeY+.5,2.1,0,Math.PI*2); c.fill();
    c.fillStyle='rgba(255,255,255,0.9)';
    c.beginPath(); c.arc(cx-3,eyeY-.5,.8,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(cx+5,eyeY-.5,.8,0,Math.PI*2); c.fill();
  } else {
    c.strokeStyle='#2a1000'; c.lineWidth=1.5; c.lineCap='round';
    c.beginPath(); c.moveTo(cx-7,eyeY); c.lineTo(cx-1,eyeY); c.stroke();
    c.beginPath(); c.moveTo(cx+1,eyeY); c.lineTo(cx+7,eyeY); c.stroke();
  }
  c.save(); c.globalAlpha=.2; c.fillStyle='#ff4466';
  c.beginPath(); c.ellipse(cx-7,eyeY+4,4,2.5,0,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+7,eyeY+4,4,2.5,0,0,Math.PI*2); c.fill();
  c.globalAlpha=1; c.restore();
  c.strokeStyle='#6b2a10'; c.lineWidth=1.2; c.lineCap='round';
  c.beginPath(); c.arc(cx,eyeY+5,3.8,.1,Math.PI-.1); c.stroke();
}

// ── Hair draw helpers ─────────────────────────────────────────────────────────
function drawAriaHairFront(c, cx, cy, hair) {
  c.fillStyle=hair;
  c.beginPath(); c.arc(cx,cy,13,Math.PI*1.1,Math.PI*1.9); c.fill();
  c.beginPath(); c.arc(cx,cy-6,9,Math.PI,0); c.fill();
  c.beginPath(); c.moveTo(cx-12,cy); c.bezierCurveTo(cx-17,cy+12,cx-15,cy+25,cx-10,cy+30);
  c.lineTo(cx-5,cy+28); c.bezierCurveTo(cx-10,cy+18,cx-10,cy+8,cx-7,cy); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(cx+12,cy); c.bezierCurveTo(cx+17,cy+12,cx+15,cy+25,cx+10,cy+30);
  c.lineTo(cx+5,cy+28); c.bezierCurveTo(cx+10,cy+18,cx+10,cy+8,cx+7,cy); c.closePath(); c.fill();
}
function drawNovaBunFront(c, cx, cy, hair) {
  c.fillStyle=hair;
  c.beginPath(); c.arc(cx,cy,13,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(cx,cy-16,7,0,Math.PI*2); c.fill();
  c.strokeStyle='#333'; c.lineWidth=.8;
  c.beginPath(); c.arc(cx,cy-16,5,Math.PI*1.2,Math.PI*1.8); c.stroke();
}

// Back-of-head hair
function drawHairBack(c, cx, cy, agent) {
  const hair = agent.hair;
  c.fillStyle = hair;
  if (agent.gender === 'F') {
    if (agent.hairStyle === 'long') {
      // Long hair covers whole head from behind + flows down
      c.beginPath(); c.arc(cx, cy, 14.5, 0, Math.PI*2); c.fill();
      // Flowing strands down the back
      c.beginPath();
      c.moveTo(cx-13, cy+5);
      c.bezierCurveTo(cx-17, cy+18, cx-14, cy+30, cx-9, cy+38);
      c.lineTo(cx+9, cy+38);
      c.bezierCurveTo(cx+14, cy+30, cx+17, cy+18, cx+13, cy+5);
      c.closePath(); c.fill();
      // Hair highlight (from behind, top shine)
      c.fillStyle='rgba(255,255,255,0.07)';
      c.beginPath(); c.arc(cx, cy-6, 8, Math.PI*1.1, Math.PI*1.9); c.closePath(); c.fill();
    } else {
      // Bun from behind
      c.beginPath(); c.arc(cx, cy, 14.5, 0, Math.PI*2); c.fill();
      c.beginPath(); c.arc(cx, cy-16, 7.5, 0, Math.PI*2); c.fill();
      c.strokeStyle='rgba(0,0,0,0.2)'; c.lineWidth=1;
      c.beginPath(); c.arc(cx, cy-16, 5.5, 0, Math.PI*2); c.stroke();
    }
  } else {
    // Male short hair from behind
    c.beginPath(); c.arc(cx, cy, 14, Math.PI*0.1, Math.PI*1.9); c.fill();
    c.fillRect(cx-13, cy-14, 26, 14);
    if (agent.hairStyle === 'medium') {
      // Slightly longer at nape
      c.beginPath(); c.arc(cx, cy+10, 6, Math.PI*.1, Math.PI*.9); c.fill();
    } else {
      c.beginPath(); c.arc(cx, cy+8, 4, Math.PI*.1, Math.PI*.9); c.fill();
    }
    // Highlight
    c.fillStyle='rgba(255,255,255,0.06)';
    c.beginPath(); c.arc(cx-2, cy-7, 7, Math.PI*1.1, Math.PI*1.9); c.closePath(); c.fill();
  }
}

// ── Female character draw ─────────────────────────────────────────────────────
function drawFemale(c, agent, cx, cy, drawLegs, showBack) {
  const {skin, hair, jacketC, shoeC} = agent;
  const skirtC = agent.skirtC || jacketC;
  const blouseC = agent.blouseC || '#f0f0ff';

  // shadow
  c.save(); c.globalAlpha=.2; c.fillStyle='#000';
  c.beginPath(); c.ellipse(cx,cy+2,15,5,0,0,Math.PI*2); c.fill();
  c.globalAlpha=1; c.restore();

  if (drawLegs) {
    const sw = Math.sin(agent.walkPhase)*4;
    c.strokeStyle=skin; c.lineWidth=5; c.lineCap='round';
    c.beginPath(); c.moveTo(cx-4,cy-12); c.lineTo(cx-5+sw,cy); c.stroke();
    c.beginPath(); c.moveTo(cx+4,cy-12); c.lineTo(cx+5-sw,cy); c.stroke();
    c.fillStyle=shoeC;
    c.beginPath(); c.ellipse(cx-5+sw,cy,5,3,0,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(cx+5-sw,cy,5,3,0,0,Math.PI*2); c.fill();
    c.strokeStyle='#333'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(cx-5+sw+3,cy-1); c.lineTo(cx-5+sw+3,cy+4); c.stroke();
    c.beginPath(); c.moveTo(cx+5-sw+3,cy-1); c.lineTo(cx+5-sw+3,cy+4); c.stroke();
  }

  // pencil skirt
  c.fillStyle=skirtC;
  c.beginPath(); c.moveTo(cx-10,cy-24); c.lineTo(cx+10,cy-24);
  c.lineTo(cx+8,cy-12); c.lineTo(cx-8,cy-12); c.closePath(); c.fill();

  // blazer
  roundRect(c, cx-13, cy-44, 26, 20, 3, jacketC);

  if (!showBack) {
    // blouse collar peek (front only)
    c.fillStyle=blouseC; c.fillRect(cx-4, cy-44, 8, 7);
  } else {
    // back seam
    c.strokeStyle='rgba(0,0,0,0.12)'; c.lineWidth=1;
    c.beginPath(); c.moveTo(cx, cy-44); c.lineTo(cx, cy-27); c.stroke();
  }

  // arms
  const as = drawLegs ? Math.sin(agent.walkPhase+Math.PI)*3 : 0;
  c.strokeStyle=jacketC; c.lineWidth=5; c.lineCap='round';
  c.beginPath(); c.moveTo(cx-13,cy-40); c.lineTo(cx-18-as,cy-28); c.stroke();
  c.fillStyle=skin; c.beginPath(); c.ellipse(cx-18-as,cy-26,4,3,0,0,Math.PI*2); c.fill();
  c.strokeStyle=jacketC; c.lineWidth=5;
  c.beginPath(); c.moveTo(cx+13,cy-40); c.lineTo(cx+18+as,cy-28); c.stroke();
  c.fillStyle=skin; c.beginPath(); c.ellipse(cx+18+as,cy-26,4,3,0,0,Math.PI*2); c.fill();

  // neck
  c.fillStyle=skin; c.fillRect(cx-3, cy-49, 6, 5);

  // head
  c.fillStyle=skin; c.beginPath(); c.arc(cx, cy-61, 13, 0, Math.PI*2); c.fill();

  if (showBack) {
    drawHairBack(c, cx, cy-61, agent);
  } else {
    if (agent.hairStyle==='long') drawAriaHairFront(c, cx, cy-61, hair);
    else drawNovaBunFront(c, cx, cy-61, hair);
    drawFace(c, cx, cy-61, agent);
  }
}

// ── Male character draw ───────────────────────────────────────────────────────
function drawMale(c, agent, cx, cy, drawLegs, showBack) {
  const {skin, hair, jacketC, shoeC, tieC} = agent;
  const pantsC = agent.pantsC || jacketC;

  // shadow
  c.save(); c.globalAlpha=.2; c.fillStyle='#000';
  c.beginPath(); c.ellipse(cx,cy+2,16,5,0,0,Math.PI*2); c.fill();
  c.globalAlpha=1; c.restore();

  if (drawLegs) {
    const sw = Math.sin(agent.walkPhase)*5;
    c.strokeStyle=pantsC; c.lineWidth=7; c.lineCap='round';
    c.beginPath(); c.moveTo(cx-5,cy-26); c.lineTo(cx-6+sw,cy); c.stroke();
    c.beginPath(); c.moveTo(cx+5,cy-26); c.lineTo(cx+6-sw,cy); c.stroke();
    c.fillStyle=shoeC;
    c.beginPath(); c.ellipse(cx-6+sw,cy,7,4,-.1,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(cx+6-sw,cy,7,4,.1,0,Math.PI*2); c.fill();
  }

  // trousers
  roundRect(c, cx-11, cy-28, 22, 6, 2, pantsC);

  // jacket
  roundRect(c, cx-14, cy-52, 28, 24, 3, jacketC);

  if (!showBack) {
    // white collar + tie (front only)
    c.fillStyle='#ffffff'; c.fillRect(cx-4, cy-51, 8, 6);
    c.fillStyle=tieC;
    c.beginPath(); c.moveTo(cx-2,cy-46); c.lineTo(cx+2,cy-46);
    c.lineTo(cx+3,cy-34); c.lineTo(cx,cy-30); c.lineTo(cx-3,cy-34); c.closePath(); c.fill();
    c.fillStyle=lightenColor(tieC,30); c.beginPath(); c.arc(cx,cy-46,2,0,Math.PI*2); c.fill();
  } else {
    // back seam
    c.strokeStyle='rgba(0,0,0,0.12)'; c.lineWidth=1;
    c.beginPath(); c.moveTo(cx,cy-52); c.lineTo(cx,cy-28); c.stroke();
    // back vent
    c.beginPath(); c.moveTo(cx,cy-38); c.lineTo(cx,cy-28); c.stroke();
  }

  // arms
  const as = drawLegs ? Math.sin(agent.walkPhase+Math.PI)*4 : 0;
  c.strokeStyle=jacketC; c.lineWidth=6; c.lineCap='round';
  c.beginPath(); c.moveTo(cx-14,cy-46); c.lineTo(cx-20-as,cy-32); c.stroke();
  c.fillStyle=skin; c.beginPath(); c.ellipse(cx-20-as,cy-30,4,3,0,0,Math.PI*2); c.fill();
  c.strokeStyle=jacketC; c.lineWidth=6;
  c.beginPath(); c.moveTo(cx+14,cy-46); c.lineTo(cx+20+as,cy-32); c.stroke();
  c.fillStyle=skin; c.beginPath(); c.ellipse(cx+20+as,cy-30,4,3,0,0,Math.PI*2); c.fill();

  // neck
  c.fillStyle=skin; c.fillRect(cx-3, cy-57, 6, 5);

  // head
  c.fillStyle=skin; c.beginPath(); c.arc(cx, cy-69, 13, 0, Math.PI*2); c.fill();

  if (showBack) {
    drawHairBack(c, cx, cy-69, agent);
  } else {
    // front hair
    c.fillStyle=hair;
    if (agent.hairStyle==='medium') {
      c.beginPath(); c.arc(cx,cy-69,13,Math.PI,0); c.fill();
      c.beginPath(); c.arc(cx,cy-76,8,Math.PI,0); c.fill();
      c.fillRect(cx-13,cy-76,10,7);
    } else {
      c.beginPath(); c.arc(cx,cy-69,13,Math.PI*1.0,0); c.fill();
      c.fillRect(cx-13,cy-78,26,9);
      c.beginPath(); c.arc(cx,cy-77,8,Math.PI,0); c.fill();
    }
    drawFace(c, cx, cy-69, agent);
  }
}

// ── Unified character draw ────────────────────────────────────────────────────
function drawCharacter(c, agent, cx, cy, drawLegs, showBack) {
  showBack = showBack || false;
  if (agent.gender==='F') drawFemale(c, agent, cx, cy, drawLegs, showBack);
  else drawMale(c, agent, cx, cy, drawLegs, showBack);
}

// ── Badges on canvas ─────────────────────────────────────────────────────────
function drawAgentBadges(c, agent, cx, baseY, frame) {
  const skills = AGENT_SKILLS[agent.id] || [];
  const live = agentLiveStatus[agent.id];

  // ── STATUS pill (above name label) ──
  c.font = 'bold 7px Segoe UI';
  c.textAlign = 'center';
  const statusLabel = live.label;
  const stW = c.measureText(statusLabel).width + 10;

  const pulseAlpha = live.status === 'querying' ? 0.6 + Math.sin(frame * 0.12) * 0.4 :
                     live.status === 'responding' ? 0.6 + Math.sin(frame * 0.08) * 0.3 : 0.85;
  c.save();
  c.globalAlpha = pulseAlpha;
  roundRect(c, cx - stW/2, baseY, stW, 11, 5, live.color + '33', live.color + '88', 0.8);
  c.fillStyle = live.color;
  c.fillText(statusLabel, cx, baseY + 8.5);
  c.globalAlpha = 1;
  c.restore();

  // ── SKILL dots (right of name, at name level) ──
  if (skills.length > 0) {
    c.font = 'bold 10px Segoe UI'; // match name font
    const nameW = c.measureText(agent.name).width;
    const dotR = 3;
    const gap = 2;
    let sx = cx + nameW/2 + 6;
    const sy = baseY + 8; // align with name label Y (hy-118 = baseY+8)

    skills.forEach(skill => {
      c.fillStyle = skill.color;
      c.beginPath();
      c.arc(sx + dotR, sy, dotR, 0, Math.PI * 2);
      c.fill();
      sx += dotR * 2 + gap;
    });
  }
}

// ── Workstation ───────────────────────────────────────────────────────────────
// Render order: Monitor(far) → Desk → Character(near) → Chair(front)
// Viewer sees character's BACK as they face the monitor/desk
function drawWorkstation(c, agent, frame) {
  const hx=agent.hx, hy=agent.hy;
  const isCEO=agent.id===0;
  const deskW=isCEO?75:68;
  const isAtDesk = agent.state==='idle' && Math.abs(agent.x-hx)<5 && Math.abs(agent.y-hy)<5;

  // Name label above monitor
  c.font='bold 10px Segoe UI'; c.textAlign='center';
  c.fillStyle=agent.color;
  c.fillText(agent.name, hx, hy-118);

  // ── Skill + Status badges (above monitor) ──
  drawAgentBadges(c, agent, hx, hy-126, frame);

  // ── 1. Monitor (farthest from viewer = background) ──
  roundRect(c, hx-32, hy-114, 64, 52, 4, '#111118', '#2a2a35', 1.5);
  roundRect(c, hx-29, hy-111, 58, 46, 2, '#04040e');

  if (isAtDesk) {
    const t = frame * 0.025;
    for (let li=0;li<6;li++) {
      const lineY=hy-108+li*7;
      const wFrac=.5*(Math.sin(t*.7+li*1.4+agent.id*.9)*.5+.5);
      const lineW=Math.floor(8+wFrac*44);
      const alpha=.35+Math.sin(t*.4+li*.8)*.2;
      c.globalAlpha=Math.max(.15,Math.min(.7,alpha));
      c.fillStyle=li%3===0?agent.color:li%3===1?'#5599ff':'rgba(200,220,255,0.8)';
      c.fillRect(hx-26,lineY,lineW,3);
    }
    c.globalAlpha=1;
    c.save(); c.globalAlpha=.18; c.shadowColor=agent.color; c.shadowBlur=14;

    c.beginPath(); c.moveTo(hx-deskW,hy-52); c.lineTo(hx+deskW,hy-52); c.stroke();
  }

  // Keyboard + mouse on desk surface
  roundRect(c, hx-22, hy-49, 44, 10, 2, '#1a1820', '#333', .5);
  c.fillStyle='#2a2a38';

  c.fillStyle='#1a1820'; c.beginPath(); c.ellipse(hx+30,hy-45,6,8,0,0,Math.PI*2); c.fill();
  c.strokeStyle='#333'; c.lineWidth=.5; c.stroke();

  // Desk front face

  // ── 3. Character sitting OR 부재중 ──
  if (isAtDesk) {
    // Character in front of desk, back facing viewer
    drawCharacter(c, agent, hx, hy, false, true);

    // Chair back (closest to viewer, covers character's lower back)
    roundRect(c, hx-18, hy-28, 36, 30, 5, '#2c2040', '#1a1030', 1);

// ── Meeting lines ─────────────────────────────────────────────────────────────
function drawMeetingLines(c) {
  // 전체 회의 모드: inMeeting 상태인 에이전트들 사이에 점선 연결
  const inMeeting = agents.filter(a => a.state === 'inMeeting');
  if (inMeeting.length >= 2) {
    const drawn = new Set();
    for (let i = 0; i < inMeeting.length; i++) {
      for (let j = i + 1; j < inMeeting.length; j++) {
        const a = inMeeting[i], b = inMeeting[j];
        const key = a.id + '-' + b.id;
        if (drawn.has(key)) continue; drawn.add(key);
        c.save(); c.setLineDash([6, 4]); c.lineWidth = 1.2; c.globalAlpha = 0.4;
        const gr = c.createLinearGradient(a.x, a.y, b.x, b.y);
        gr.addColorStop(0, a.color + 'aa'); gr.addColorStop(1, b.color + 'aa');
        c.strokeStyle = gr; c.beginPath(); c.moveTo(a.x, a.y - 22); c.lineTo(b.x, b.y - 22); c.stroke();
        c.setLineDash([]); c.globalAlpha = 1; c.restore();
      }
    }
  }
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let hoveredAgentId = -1;

function showTooltip(agent, mx, my) {
  const info = AGENT_INFO[agent.id];
  let html = `
    <div class="tt-name" style="color:${agent.color}">${agent.name}</div>
    <div class="tt-badge">${info.title} · ${info.titleSub}</div>
    <hr>
    <div class="tt-sec">📋 역할</div>
    ${info.roles.map(r=>`<div class="tt-item">${r}</div>`).join('')}
    <div class="tt-sec">⚡ 현재 업무</div>
    ${info.current.map(t=>`<div class="tt-item">${t}</div>`).join('')}
    <div class="tt-sec pending tt-pending">⏳ 대기 업무</div>
    ${info.pending.map(t=>`<div class="tt-item">${t}</div>`).join('')}
  `;
  const skills = AGENT_SKILLS[agent.id] || [];
  if (skills.length > 0) {
    html += `<div class="tt-sec">🔗 데이터 소스</div>`;
    html += skills.map(s => `<div class="tt-item">${s.icon} ${s.label}</div>`).join('');
  }
  if (info.question) html += `<div class="tt-q">❓ ${info.question}</div>`;
  const live = agentLiveStatus[agent.id];
  html += `<div class="tt-status"><span style="background:${live.color}"></span>${live.label}</div>`;
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  // Position near mouse, avoid overflow
  const tw = 300, th = tooltip.offsetHeight || 320;
  let tx = mx + 18, ty = my - th/2;
  if (tx + tw > window.innerWidth - 10) tx = mx - tw - 18;
  if (ty < 10) ty = 10;
  if (ty + th > window.innerHeight - 10) ty = window.innerHeight - th - 10;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';

  // Color accent border
  tooltip.style.borderColor = agent.color + '55';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  hoveredAgentId = -1;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = 1600 / rect.width;
  const scaleY = 900  / rect.height;
  const cx2 = (e.clientX - rect.left) * scaleX;
  const cy2 = (e.clientY - rect.top)  * scaleY;

  let found = null;
  for (const agent of agents) {
    const ax = agent.state==='idle' ? agent.hx : agent.x;
    const ay = agent.state==='idle' ? agent.hy : agent.y;
    if (Math.abs(cx2-ax) < 32 && cy2 > ay-100 && cy2 < ay+20) { found=agent; break; }
  }

  if (found) {
    canvas.style.cursor = 'pointer';
    if (found.id !== hoveredAgentId) { hoveredAgentId=found.id; showTooltip(found, e.clientX, e.clientY); }
    else {
      // update position only
      const tw=300, th=tooltip.offsetHeight||320;
      let tx=e.clientX+18, ty=e.clientY-th/2;
      if (tx+tw>window.innerWidth-10) tx=e.clientX-tw-18;
      if (ty<10) ty=10;
      if (ty+th>window.innerHeight-10) ty=window.innerHeight-th-10;
      tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
    }
  } else {
    canvas.style.cursor='default';
    if (hoveredAgentId !== -1) hideTooltip();
  }
});
canvas.addEventListener('mouseleave', hideTooltip);

// ── Main loop ─────────────────────────────────────────────────────────────────
let frame=0;
function loop() {
  frame++;
  const c=ctx;
  c.drawImage(woodOff,0,0);
  drawCeiling(c);
  drawCEORoom(c, frame);
  MR.forEach(mr=>drawMeetingRoom(c,mr,frame));
  drawDecorations(c);
  agents.forEach(agent=>drawWorkstation(c,agent,frame));
  drawMeetingLines(c);

  // Walking / meeting agents — front-facing, sorted by Y
  // Draw any agent not sitting at their desk (including idle agents displaced from desk)
  agents.filter(a=> a.state!=='idle' || (Math.abs(a.x-a.hx)>=5 || Math.abs(a.y-a.hy)>=5) ).sort((a,b)=>a.y-b.y).forEach(agent=>{
    drawCharacter(c, agent, agent.x, agent.y, true, false);
    // name tag for moving agents
    c.font='bold 9px Segoe UI'; c.textAlign='center';
    c.fillStyle='rgba(8,12,28,0.75)';
    roundRect(c, agent.x-22, agent.y+6, 44, 14, 4, 'rgba(8,12,28,0.75)');
    c.fillStyle=agent.color; c.fillText(agent.name, agent.x, agent.y+17);
  });

  // Room outline
  c.save(); c.strokeStyle='rgba(0,0,0,0.55)'; c.lineWidth=3;
  c.strokeRect(20,60,1555,840);
  c.beginPath(); c.moveTo(1290,460); c.lineTo(1575,460); c.stroke();
  c.restore();

  agents.forEach(a=>a.update(agents));
  if (frame%30===0) updateUI();
  requestAnimationFrame(loop);
}

// ── Chat System ──────────────────────────────────────────────────────────────

const CHAT_AGENTS = [
  { id: -1, name: '전체 회의', role: '모든 에이전트 참여', color: '#58a6ff' },
  ...AGENT_CFG.map(a => ({ id: a.id, name: a.name, role: AGENT_INFO[a.id].title, color: a.color }))
];

let currentChatAgent = -1; // -1 = 전체회의
let ws = null;
let isStreaming = false;
const chatHistories = {}; // agentId → [{role, name, content}]
CHAT_AGENTS.forEach(a => chatHistories[a.id] = []);

// ── Tabs ──
function buildTabs() {
  const tabsEl = document.getElementById('chat-tabs');
  tabsEl.innerHTML = '';
  CHAT_AGENTS.forEach(a => {
    const tab = document.createElement('button');
    tab.className = 'chat-tab' + (a.id === currentChatAgent ? ' active' : '');
    tab.innerHTML = (a.id >= 0 ? `<span class="tab-dot" style="background:${a.color}"></span>` : '') + a.name;
    tab.onclick = () => switchChat(a.id);
    tabsEl.appendChild(tab);
  });
}

function switchChat(agentId) {
  currentChatAgent = agentId;
  buildTabs();
  updateChatHeader();
  renderMessages();

  // 하단 agent-card 하이라이트
  document.querySelectorAll('.agent-card').forEach((card, i) => {
    card.classList.toggle('active', i === agentId);
  });
}

function updateChatHeader() {
  const agent = CHAT_AGENTS.find(a => a.id === currentChatAgent);
  const nameEl = document.getElementById('chat-header-name');
  const roleEl = document.getElementById('chat-header-role');
  nameEl.textContent = agent.name;
  nameEl.style.color = agent.color;
  roleEl.textContent = agent.role;
}

// ── Messages ──
function renderMessages() {
  const box = document.getElementById('chat-messages');
  const msgs = chatHistories[currentChatAgent] || [];

  if (msgs.length === 0) {
    const agent = CHAT_AGENTS.find(a => a.id === currentChatAgent);
    box.innerHTML = `<div class="chat-welcome">
      <div class="welcome-icon">${currentChatAgent === -1 ? '🏢' : '💬'}</div>
      <div class="welcome-name">${agent.name}</div>
      <p style="margin-top:8px">${agent.role}</p>
      <p style="margin-top:16px; color:#586069; font-size:12px">
        ${currentChatAgent === -1
          ? '전체 에이전트에게 질문하면 CEO부터 순서대로 답변합니다.'
          : `${agent.name}에게 메시지를 보내보세요.`}
      </p>
    </div>`;
    return;
  }

  box.innerHTML = '';
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + m.role;
    if (m.role === 'agent') {
      const agentData = CHAT_AGENTS.find(a => a.id === m.agentId) || {};
      div.style.borderLeftColor = agentData.color || '#555';
      div.innerHTML = `<div class="msg-name" style="color:${agentData.color || '#888'}">${m.name || agentData.name}</div>${formatMessage(m.content)}`;
    } else {
      div.textContent = m.content;
    }
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function formatMessage(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code style="background:#2a2f3a;padding:1px 4px;border-radius:3px;font-size:12px">$1</code>');
}

function appendStreamDelta(agentId, delta) {
  const msgs = chatHistories[currentChatAgent];
  const last = msgs[msgs.length - 1];
  if (last && last.role === 'agent' && last.agentId === agentId && last.streaming) {
    last.content += delta;
  }
  // 현재 탭이 맞으면 실시간 업데이트
  renderMessages();
}

// ── WebSocket ──
function connectWS() {
  try {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = location.host;
    if (!host) {
      const st = document.getElementById('connection-status');
      st.textContent = '로컬 파일 모드 — 채팅은 서버 실행 후 사용 가능 (node server/index.js)';
      st.className = 'disconnected';
      return;
    }
    const url = `${protocol}//${host}`;
    ws = new WebSocket(url);

    ws.onopen = () => {
      const st = document.getElementById('connection-status');
      st.textContent = '서버 연결됨';
      st.className = 'connected';
    };

    ws.onclose = () => {
      const st = document.getElementById('connection-status');
      st.textContent = '서버 연결 끊김 — 3초 후 재연결...';
      st.className = 'disconnected';
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
      const st = document.getElementById('connection-status');
      st.textContent = '서버에 연결할 수 없습니다 (node server/index.js 실행 필요)';
      st.className = 'disconnected';
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      handleWSMessage(msg);
    };
  } catch (err) {
    console.warn('WebSocket 연결 실패:', err);
    const st = document.getElementById('connection-status');
    st.textContent = '서버에 연결할 수 없습니다 (node server/index.js 실행 필요)';
    st.className = 'disconnected';
  }
}

// ── Results Panel (결과물 패널) ──────────────────────────────────────────────

let panelMode = 'chat'; // 'chat' | 'results'
const toolActivities = []; // [{agentId, agentName, toolName, toolLabel, inputSummary, preview, success, resultSize, timestamp}]
let resultsFilter = 'all'; // 'all' | agentId

function setPanelMode(mode) {
  panelMode = mode;
  // 토글 버튼 업데이트
  document.querySelectorAll('.panel-mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && mode === 'chat') || (i === 1 && mode === 'results'));
  });

  const chatTabs = document.getElementById('chat-tabs');
  const chatHeader = document.getElementById('chat-header');
  const chatMessages = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input-area');
  const resultsPanel = document.getElementById('results-panel');
  const resultsFilterEl = document.getElementById('results-filter');

  if (mode === 'chat') {
    chatTabs.style.display = '';
    chatHeader.style.display = '';
    chatMessages.style.display = '';
    chatInput.style.display = '';
    resultsPanel.style.display = 'none';
    resultsFilterEl.style.display = 'none';
  } else {
    chatTabs.style.display = 'none';
    chatHeader.style.display = 'none';
    chatMessages.style.display = 'none';
    chatInput.style.display = 'none';
    resultsPanel.style.display = 'flex';
    resultsFilterEl.style.display = 'flex';
    renderResultsFilter();
    renderResults();
  }
}

function addToolActivity(data) {
  toolActivities.unshift(data); // 최신이 위로
  // 뱃지 업데이트
  const badge = document.getElementById('results-badge');
  badge.textContent = toolActivities.length;
  badge.classList.remove('empty');

  if (panelMode === 'results') {
    renderResults();
  }
}

function renderResultsFilter() {
  const filterEl = document.getElementById('results-filter');
  // 활동이 있는 에이전트만 필터 표시
  const agentIds = [...new Set(toolActivities.map(a => a.agentId))];
  const agentMap = {};
  toolActivities.forEach(a => { agentMap[a.agentId] = a.agentName; });

  let html = `<button class="results-filter-btn ${resultsFilter === 'all' ? 'active' : ''}" onclick="setResultsFilter('all')">전체</button>`;
  agentIds.forEach(id => {
    const agent = AGENT_CFG.find(a => a.id === id);
    const color = agent ? agent.color : '#888';
    html += `<button class="results-filter-btn ${resultsFilter === id ? 'active' : ''}" onclick="setResultsFilter(${id})">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color};margin-right:3px;vertical-align:middle"></span>${agentMap[id]}
    </button>`;
  });
  filterEl.innerHTML = html;
}

function setResultsFilter(filter) {
  resultsFilter = filter;
  renderResultsFilter();
  renderResults();
}

function renderResults() {
  const panel = document.getElementById('results-panel');

  const filtered = resultsFilter === 'all'
    ? toolActivities
    : toolActivities.filter(a => a.agentId === resultsFilter);

  if (filtered.length === 0) {
    panel.innerHTML = `<div class="results-empty">
      <div class="empty-icon">📊</div>
      <div style="font-size:15px; font-weight:600; color:#c9d1d9; margin-bottom:8px">결과물이 없습니다</div>
      <div>에이전트가 데이터를 조회하면<br>여기에 결과가 표시됩니다.</div>
    </div>`;
    return;
  }

  // 에이전트별 그룹핑 (필터가 all일 때) 또는 단일 리스트
  let html = '';

  if (resultsFilter === 'all') {
    // 시간순 단일 리스트
    filtered.forEach((act, idx) => {
      html += buildResultCard(act, idx);
    });
  } else {
    filtered.forEach((act, idx) => {
      html += buildResultCard(act, idx);
    });
  }

  panel.innerHTML = html;
}

function buildResultCard(act, idx) {
  const agent = AGENT_CFG.find(a => a.id === act.agentId);
  const color = agent ? agent.color : '#888';
  const time = new Date(act.timestamp);
  const timeStr = time.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const sizeStr = act.resultSize > 1024 ? (act.resultSize / 1024).toFixed(1) + 'KB' : act.resultSize + 'B';

  return `<div class="result-card ${act.success ? 'success' : 'error'}" onclick="toggleResultDetail(this)">
    <div class="result-card-header">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="result-agent-dot" style="background:${color}"></span>
        <span style="font-size:11px;color:${color};font-weight:600">${act.agentName}</span>
        <span class="result-tool-label">${act.toolLabel}</span>
      </div>
      <span class="result-time">${timeStr}</span>
    </div>
    <div class="result-input" title="${escapeHtml(act.inputSummary)}">→ ${escapeHtml(act.inputSummary)}</div>
    <div class="result-preview">${escapeHtml(act.preview)}</div>
    ${act.success ? `<div class="result-size">${sizeStr}</div>` : ''}
  </div>`;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleResultDetail(el) {
  el.classList.toggle('expanded');
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'stream_start': {
      const target = currentChatAgent;
      const msgs = chatHistories[target];
      msgs.push({ role: 'agent', agentId: msg.agentId, name: msg.agentName, content: '', streaming: true });
      setAgentLiveStatus(msg.agentId, 'responding');
      // 1:1 대화: 해당 에이전트 모니터 활성 효과
      setChatActiveAgent(msg.agentId);
      renderMessages();
      break;
    }
    case 'stream_delta': {
      appendStreamDelta(msg.agentId, msg.delta);
      break;
    }
    case 'stream_end': {
      const msgs = chatHistories[currentChatAgent];
      const last = msgs[msgs.length - 1];
      if (last && last.streaming) last.streaming = false;
      isStreaming = false;
      setAgentLiveStatus(msg.agentId, 'idle');
      clearChatActiveAgent();
      document.getElementById('chat-send').disabled = false;
      document.getElementById('chat-input').focus();
      renderMessages();
      break;
    }
    case 'meeting_start': {
      isStreaming = true;
      document.getElementById('chat-send').disabled = true;
      [0,1,2,3,4].forEach(id => setAgentLiveStatus(id, 'meeting'));
      // 캔버스: 5명 전원 회의실로 이동
      triggerCanvasMeeting();
      break;
    }
    case 'meeting_end': {
      isStreaming = false;
      document.getElementById('chat-send').disabled = false;
      document.getElementById('chat-input').focus();
      [0,1,2,3,4].forEach(id => setAgentLiveStatus(id, 'idle'));
      // 캔버스: 전원 자리 복귀
      endCanvasMeeting();
      break;
    }
    case 'tool_activity': {
      addToolActivity(msg);
      // 도구 조회 상태 표시 후 짧게 유지
      setAgentLiveStatus(msg.agentId, 'querying');
      setTimeout(() => {
        if (agentLiveStatus[msg.agentId].status === 'querying') {
          setAgentLiveStatus(msg.agentId, 'responding');
        }
      }, 2000);
      break;
    }
    case 'error': {
      const msgs = chatHistories[currentChatAgent];
      msgs.push({ role: 'agent', agentId: msg.agentId || -1, name: '시스템', content: msg.message });
      isStreaming = false;
      document.getElementById('chat-send').disabled = false;
      renderMessages();
      break;
    }
  }
}

// ── Send ──
function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert('서버에 연결되어 있지 않습니다.\n터미널에서 cd server && npm start 를 실행하세요.');
    return;
  }

  // 사용자 메시지 저장
  chatHistories[currentChatAgent].push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  renderMessages();

  isStreaming = true;
  document.getElementById('chat-send').disabled = true;

  if (currentChatAgent === -1) {
    ws.send(JSON.stringify({ type: 'meeting', content: text }));
  } else {
    ws.send(JSON.stringify({ type: 'chat', agentId: currentChatAgent, content: text }));
  }
}

function clearChat() {
  if (!confirm('대화 내역을 초기화할까요?')) return;
  chatHistories[currentChatAgent] = [];
  renderMessages();
  // 서버에도 알림
  if (ws && ws.readyState === WebSocket.OPEN) {
    fetch(`/api/clear/${currentChatAgent}`, { method: 'POST' }).catch(() => {});
  }
}

// ── Input handling ──
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Canvas click → switch chat ──
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = 1600 / rect.width;
  const scaleY = 900 / rect.height;
  const cx2 = (e.clientX - rect.left) * scaleX;
  const cy2 = (e.clientY - rect.top) * scaleY;

  for (const agent of agents) {
    const ax = agent.state === 'idle' ? agent.hx : agent.x;
    const ay = agent.state === 'idle' ? agent.hy : agent.y;
    if (Math.abs(cx2 - ax) < 32 && cy2 > ay - 100 && cy2 < ay + 20) {
      switchChat(agent.id);
      document.getElementById('chat-input').focus();
      return;
    }
  }
});

// ── Init chat ──
buildTabs();
updateChatHeader();
renderMessages();

// ── Updated UI Panel (clickable cards) ──
updateUI();
loop();

// WebSocket은 loop 이후에 연결 (실패해도 캔버스에 영향 없음)
connectWS();
</script>
